<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Certeiro &mdash; Registro</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#191949;--white:#FFFFFF;--bg:#F5F5F8;--text:#191949;--muted:#8E8EA0;
  --s2:#ECECF1;--s3:#D9D9E3;--green:#10B981;--green-bg:rgba(16,185,129,0.08);
  --green-l:#D1FAE5;--red:#EF4444;--red-bg:rgba(239,68,68,0.08);--red-l:#FEE2E2;
  --yellow:#F59E0B;--yellow-bg:rgba(245,158,11,0.08);--yellow-l:#FEF3C7;
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,0.08);--blue-l:#DBEAFE;
  --card-shadow:0 1px 3px rgba(25,25,73,0.06),0 1px 2px rgba(25,25,73,0.04);
  --card-radius:14px
}
html,body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}

/* HEADER */
.hdr{background:var(--navy);display:flex;justify-content:space-between;align-items:center;padding:14px 20px 12px;position:sticky;top:0;z-index:200}
.hdr-logo .brand{color:#fff;font-size:14px;font-weight:900;letter-spacing:2.2px;text-transform:uppercase}
.hdr-logo .sub{color:rgba(255,255,255,0.35);font-size:8.5px;letter-spacing:1.6px;text-transform:uppercase;margin-top:2px}
.hdr-date{text-align:right}
.hdr-date .d1{color:rgba(255,255,255,0.4);font-size:10px}
.hdr-date .d2{color:rgba(255,255,255,0.8);font-size:11px;font-weight:700;margin-top:1px}

/* STEP BAR */
.step-bar{background:var(--navy);border-top:1px solid rgba(255,255,255,0.07);padding:10px 20px;display:flex;align-items:center;gap:6px;overflow-x:auto}
.step-dot-wrap{display:flex;align-items:center;gap:6px}
.sdot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;transition:all .2s}
.sdot.done{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.6)}
.sdot.active{background:var(--yellow);color:#fff}
.sdot.pending{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.25)}
.step-lbl{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap}
.step-lbl.active{color:var(--yellow)}
.step-lbl.done{color:rgba(255,255,255,0.4)}
.step-lbl.pending{color:rgba(255,255,255,0.2)}
.step-sep{color:rgba(255,255,255,0.15);font-size:10px;flex-shrink:0}

/* PAGE */
.page{padding:16px 16px 100px;max-width:480px;margin:0 auto}

/* CARDS */
.card{background:var(--white);border-radius:var(--card-radius);padding:18px;border:1px solid var(--s2);box-shadow:var(--card-shadow);margin-bottom:12px}
.section-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}

/* TIPO ESCOLHA */
.tipo-wrap{display:flex;gap:12px}
.tipo-btn{flex:1;border:2px solid var(--s2);border-radius:14px;padding:20px 12px;text-align:center;cursor:pointer;background:var(--white);transition:all .15s;font-family:'Nunito Sans',sans-serif}
.tipo-btn:active{transform:scale(0.97)}
.tipo-btn.sel{border-color:var(--navy);background:var(--navy)}
.tipo-icon{font-size:28px;margin-bottom:8px}
.tipo-label{font-size:13px;font-weight:800;color:var(--text)}
.tipo-sub{font-size:10px;color:var(--muted);margin-top:3px}
.tipo-btn.sel .tipo-label,.tipo-btn.sel .tipo-sub{color:#fff}

/* IMOVEL SELECTOR */
.imovel-list{display:flex;flex-direction:column;gap:8px}
.imovel-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--s2);border-radius:12px;cursor:pointer;background:var(--white);transition:all .15s}
.imovel-item:active{background:var(--bg)}
.imovel-item.sel{border-color:var(--navy);background:rgba(25,25,73,0.03)}
.imovel-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:var(--s3)}
.imovel-item.sel .imovel-dot{background:var(--navy)}
.imovel-nome{font-size:13px;font-weight:700;color:var(--text);flex:1}
.imovel-preco{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}

/* CORRETOR CARDS */
.corretor-list{display:flex;gap:12px}
.corretor-card{flex:1;border:2px solid var(--s2);border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;background:var(--white);transition:all .15s;font-family:'Nunito Sans',sans-serif}
.corretor-card:active{transform:scale(0.97)}
.corretor-card.sel{border-color:var(--navy);background:rgba(25,25,73,0.03)}
.corretor-foto{width:64px;height:64px;border-radius:50%;object-fit:cover;margin:0 auto 8px;display:block;background:var(--s2)}
.corretor-nome{font-size:11px;font-weight:800;color:var(--text);line-height:1.3}
.corretor-creci{font-size:9px;color:var(--muted);margin-top:2px}

/* FORM FIELDS */
.field{margin-bottom:14px}
.field-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.field-lbl .req{color:var(--red)}
.finput{box-sizing:border-box;width:100%;border:1.5px solid var(--s2);border-radius:10px;padding:12px 14px;font-size:14px;font-family:'Nunito Sans',sans-serif;color:var(--navy);background:var(--white);outline:none;-webkit-appearance:none;min-height:46px;display:block;transition:border-color .15s}
.finput:focus{border-color:var(--navy)}
.finput::placeholder{color:var(--s3)}
textarea.finput{resize:none;min-height:80px;font-size:13px}

/* CHIP BUTTONS */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:8px 13px;border-radius:8px;border:1.5px solid var(--s2);background:var(--white);font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:all .15s;white-space:nowrap}
.chip.sel{border-color:var(--navy);background:var(--navy);color:#fff}
.chip.sel-green{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.chip.sel-yellow{border-color:var(--yellow);background:var(--yellow-bg);color:var(--yellow)}
.chip.sel-red{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.chip.sel-blue{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.chip.sel-muted{border-color:var(--s3);background:var(--s2);color:var(--muted)}

/* QUALIF TOGGLE */
.toggle-row{display:flex;gap:8px}
.toggle-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--s2);background:var(--white);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Nunito Sans',sans-serif;text-align:center;transition:all .15s}
.toggle-btn.sel-sim{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.toggle-btn.sel-nao{border-color:var(--red);background:var(--red-bg);color:var(--red)}

/* VALOR INPUT */
.valor-wrap{display:flex;align-items:center;gap:8px;border:1.5px solid var(--s2);border-radius:10px;background:var(--white);padding:0 14px;transition:border-color .15s}
.valor-wrap:focus-within{border-color:var(--navy)}
.valor-prefix{font-size:14px;font-weight:700;color:var(--muted);flex-shrink:0}
.valor-input{flex:1;border:none;background:transparent;font-size:16px;font-weight:800;color:var(--navy);font-family:'Nunito Sans',sans-serif;padding:12px 0;outline:none;min-width:0}

/* PARCEIRO */
.parceiro-toggle{display:flex;gap:8px;margin-bottom:10px}
.parceiro-btn{flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--s2);background:var(--white);font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Nunito Sans',sans-serif;text-align:center;transition:all .15s}
.parceiro-btn.sel{border-color:var(--navy);background:var(--navy);color:#fff}

/* REVIEW */
.rev-section{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--s2)}
.rev-section:last-child{border-bottom:none;margin-bottom:0}
.rev-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.rev-val{font-size:13px;font-weight:700;color:var(--text)}
.rev-val.big{font-size:18px;font-weight:900;color:var(--navy)}
.rev-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.rev-chip{font-size:9px;font-weight:700;padding:3px 9px;border-radius:8px;background:var(--bg);color:var(--navy)}

/* PROPOSTA POS-VISITA */
.proposta-pos{background:var(--yellow-bg);border:1.5px solid var(--yellow-l);border-radius:14px;padding:18px;margin-bottom:12px}
.proposta-pos-title{font-size:14px;font-weight:800;color:var(--yellow);margin-bottom:4px}
.proposta-pos-sub{font-size:11px;color:#92400e;margin-bottom:14px}
.proposta-pos-btns{display:flex;gap:10px}
.pp-btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:13px;font-weight:800;font-family:'Nunito Sans',sans-serif;cursor:pointer;transition:all .15s;text-align:center}
.pp-btn:active{transform:scale(0.97)}
.pp-sim{background:var(--navy);color:#fff}
.pp-nao{background:var(--white);color:var(--navy);border:1.5px solid var(--s2)!important;border:none}

/* SUCCESS */
.success-wrap{text-align:center;padding:40px 20px}
.success-icon{font-size:56px;margin-bottom:16px}
.success-title{font-size:18px;font-weight:900;color:var(--green);margin-bottom:6px}
.success-sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:28px}
.novo-btn{display:inline-block;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:14px;font-weight:800;font-family:'Nunito Sans',sans-serif;cursor:pointer;transition:opacity .15s}
.novo-btn:active{opacity:0.8}

/* FOOTER ACAO */
.footer-acao{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--s2);padding:12px 20px env(safe-area-inset-bottom,12px);max-width:480px;margin:0 auto;display:flex;gap:10px;z-index:100}
.btn-back{background:var(--bg);border:1.5px solid var(--s2);border-radius:12px;padding:13px 18px;font-size:13px;font-weight:700;color:var(--navy);cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:all .15s;flex-shrink:0}
.btn-back:active{background:var(--s2)}
.btn-next{flex:1;background:var(--navy);border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;color:#fff;cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:opacity .15s}
.btn-next:active{opacity:0.8}
.btn-next:disabled{opacity:0.4;cursor:not-allowed}
.btn-next.green{background:var(--green)}

/* LOADING */
.loading{text-align:center;padding:40px 20px}
.loading-spin{width:28px;height:28px;border:3px solid var(--s2);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:var(--muted)}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;font-size:13px;font-weight:700;padding:12px 22px;border-radius:12px;z-index:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

::-webkit-scrollbar{width:0;height:0}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">
    <div class="brand">Gabriel Certeiro</div>
    <div class="sub" id="hdrSub">Registro</div>
  </div>
  <div class="hdr-date">
    <div class="d1" id="hdrData">-</div>
    <div class="d2" id="hdrDia">-</div>
  </div>
</div>

<div id="stepBarWrap" class="hidden">
  <div class="step-bar" id="stepBar"></div>
</div>

<div class="page" id="mainPage">
  <div class="loading" id="loadingWrap">
    <div class="loading-spin"></div>
    <div class="loading-txt">Carregando...</div>
  </div>
</div>

<div class="footer-acao hidden" id="footerAcao">
  <button class="btn-back" id="btnBack" onclick="voltarPasso()">&#8592;</button>
  <button class="btn-next" id="btnNext" onclick="avancarPasso()">Continuar</button>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPA_URL='https://vtykzralkxlbqqkleofl.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0eWt6cmFsa3hsYnFxa2xlb2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjMyNjAsImV4cCI6MjA4OTkzOTI2MH0.rYBifw2NXqVDGrKbDWKJgrFAIdoruxxsIPc9RXibgy0';
var sb=supabase.createClient(SUPA_URL,SUPA_KEY);

// Estado global
var S={
  tipo:null, // 'visita' | 'proposta'
  imovel:null,
  corretor:null,
  parceiro:null,
  nome:'',
  data:'',
  origem:'',
  objections:[],
  observacoes:'',
  intencao:null,
  qualif:null,
  pagto:[],
  pagto_detalhes:'',
  // proposta
  prop_valor:'',
  prop_pagto:null,
  prop_status:'em_andamento',
  prop_obs:'',
  // fluxo
  posVisitaProposta:null // true = usuario escolheu registrar proposta apos visita
};

var imoveis=[];
var corretores=[];
var passo=0; // passo atual
var PASSOS_VISITA=['tipo','imovel','corretor','interessado','feedback','resultado','pagamento','revisao'];
var PASSOS_PROPOSTA=['tipo','imovel','corretor','proposta_form','revisao_prop'];

function passos(){return S.tipo==='proposta'?PASSOS_PROPOSTA:PASSOS_VISITA;}

// --- INIT ---
async function init(){
  initHeader();
  await Promise.all([loadImoveis(),loadCorretores()]);
  renderPasso();
}

function initHeader(){
  var d=new Date();
  var m=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  document.getElementById('hdrData').textContent=d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear();
  document.getElementById('hdrDia').textContent='Dia '+(Math.floor((d-new Date(d.getFullYear(),0,0))/86400000))+' / '+((((d.getFullYear()%4===0&&d.getFullYear()%100!==0)||d.getFullYear()%400===0)?366:365));
}

async function loadImoveis(){
  var res=await sb.from('imoveis').select('id,nome,preco,ativo').eq('ativo',true).order('nome');
  imoveis=(res.data||[]);
}

async function loadCorretores(){
  var res=await sb.from('corretores').select('id,nome,creci,foto_url').eq('ativo',true).order('nome');
  corretores=(res.data||[]);
}

// --- STEP BAR ---
function renderStepBar(){
  var ps=passos();
  if(ps.length<=1){document.getElementById('stepBarWrap').classList.add('hidden');return;}
  document.getElementById('stepBarWrap').classList.remove('hidden');
  var labels={
    tipo:'Tipo',imovel:'Imovel',corretor:'Corretor',interessado:'Interessado',
    feedback:'Feedback',resultado:'Resultado',pagamento:'Pagamento',revisao:'Revisao',
    proposta_form:'Proposta',revisao_prop:'Revisao'
  };
  var html='';
  for(var i=0;i<ps.length;i++){
    var cls=i<passo?'done':i===passo?'active':'pending';
    var lblCls=cls;
    html+='<div class="step-dot-wrap"><div class="sdot '+cls+'">'+(i<passo?'&#10003;':(i+1))+'</div><span class="step-lbl '+lblCls+'">'+labels[ps[i]]+'</span></div>';
    if(i<ps.length-1)html+='<span class="step-sep">&#8250;</span>';
  }
  document.getElementById('stepBar').innerHTML=html;
}

// --- RENDER PASSO ---
function renderPasso(){
  var ps=passos();
  var current=ps[passo];
  renderStepBar();
  document.getElementById('footerAcao').classList.toggle('hidden',current==='tipo'||current==='revisao'||current==='revisao_prop');
  document.getElementById('btnBack').classList.toggle('hidden',passo===0);

  var page=document.getElementById('mainPage');
  switch(current){
    case 'tipo':        page.innerHTML=renderTipo();break;
    case 'imovel':      page.innerHTML=renderImovel();break;
    case 'corretor':    page.innerHTML=renderCorretor();break;
    case 'interessado': page.innerHTML=renderInteressado();break;
    case 'feedback':    page.innerHTML=renderFeedback();break;
    case 'resultado':   page.innerHTML=renderResultado();break;
    case 'pagamento':   page.innerHTML=renderPagamento();break;
    case 'revisao':     page.innerHTML=renderRevisao();break;
    case 'proposta_form':page.innerHTML=renderPropostaForm();break;
    case 'revisao_prop':page.innerHTML=renderRevisaoProp();break;
  }
  window.scrollTo({top:0});
  updateBtnNext();
}

function updateBtnNext(){
  var ps=passos();
  var current=ps[passo];
  var btn=document.getElementById('btnNext');
  var isLast=passo===ps.length-2; // penultimo = antes da revisao
  btn.textContent=isLast?'Revisar':'Continuar';
  btn.classList.toggle('green',isLast);
}

// --- PASSOS ---
function renderTipo(){
  return '<div style="padding-top:8px"><div class="section-title">O que voce quer registrar?</div>'+
  '<div class="tipo-wrap">'+
  '<div class="tipo-btn'+(S.tipo==='visita'?' sel':'')+'" onclick="selTipo(\'visita\')">'+
    '<div class="tipo-icon">&#127968;</div>'+
    '<div class="tipo-label">Visita</div>'+
    '<div class="tipo-sub">Registro completo de visita</div>'+
  '</div>'+
  '<div class="tipo-btn'+(S.tipo==='proposta'?' sel':'')+'" onclick="selTipo(\'proposta\')">'+
    '<div class="tipo-icon">&#128172;</div>'+
    '<div class="tipo-label">Proposta</div>'+
    '<div class="tipo-sub">Proposta sem visita presencial</div>'+
  '</div>'+
  '</div></div>';
}

function selTipo(t){
  S.tipo=t;
  passo=1;
  renderPasso();
}

function renderImovel(){
  var html='<div class="section-title">Qual imovel?</div><div class="imovel-list">';
  for(var i=0;i<imoveis.length;i++){
    var im=imoveis[i];
    var sel=S.imovel&&S.imovel.id===im.id;
    html+='<div class="imovel-item'+(sel?' sel':'')+'" onclick="selImovel(\''+im.id+'\',\''+escHtml(im.nome)+'\',\''+escHtml(im.preco||'')+'\')">' +
      '<div class="imovel-dot"></div>'+
      '<div class="imovel-nome">'+escHtml(im.nome)+'</div>'+
      '<div class="imovel-preco">'+(im.preco||'')+'</div>'+
    '</div>';
  }
  html+='</div>';
  return html;
}

function selImovel(id,nome,preco){
  S.imovel={id:id,nome:nome,preco:preco};
  document.querySelectorAll('.imovel-item').forEach(function(el){el.classList.remove('sel');});
  event.currentTarget.classList.add('sel');
  updateBtnNext();
  setTimeout(avancarPasso,200);
}

function renderCorretor(){
  var html='<div class="section-title">Corretor responsavel</div><div class="corretor-list">';
  for(var i=0;i<corretores.length;i++){
    var c=corretores[i];
    var sel=S.corretor&&S.corretor.id===c.id;
    var ini=c.nome.charAt(0);
    var fotoHtml=c.foto_url?
      '<img class="corretor-foto" src="'+c.foto_url+'" alt="'+escHtml(c.nome)+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'+
      '<div class="corretor-foto" style="display:none;background:var(--navy);align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff">'+ini+'</div>':
      '<div class="corretor-foto" style="display:flex;background:var(--navy);align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff">'+ini+'</div>';
    html+='<div class="corretor-card'+(sel?' sel':'')+'" onclick="selCorretor(\''+c.id+'\',\''+escHtml(c.nome)+'\',\''+escHtml(c.creci||'')+'\')">'+
      fotoHtml+
      '<div class="corretor-nome">'+escHtml(c.nome)+'</div>'+
      '<div class="corretor-creci">CRECI '+escHtml(c.creci||'')+'</div>'+
    '</div>';
  }
  html+='</div>';
  return html;
}

function selCorretor(id,nome,creci){
  S.corretor={id:id,nome:nome,creci:creci};
  document.querySelectorAll('.corretor-card').forEach(function(el){el.classList.remove('sel');});
  event.currentTarget.classList.add('sel');
  updateBtnNext();
  setTimeout(avancarPasso,200);
}

function renderInteressado(){
  var origens=['Meta Ads','Google Ads','Instagram Organico','Indicacao','Disparo de base','Corretor parceiro','Site / Organico','YouTube','TikTok','Relacionamento','Outro'];
  var html='<div class="section-title">Dados do interessado</div>'+

// --- NAVEGACAO ---
function avancarPasso(){
  if(!validarPasso())return;
  coletarDadosPasso();
  if(passo<passos().length-1){passo++;renderPasso();}
}

function voltarPasso(){
  if(passo>0){passo--;renderPasso();}
}

function validarPasso(){
  var ps=passos();
  var current=ps[passo];
  if(current==='imovel'&&!S.imovel){showToast('Selecione um imovel');return false;}
  if(current==='corretor'&&!S.corretor){showToast('Selecione o corretor responsavel');return false;}
  if(current==='interessado'){
    var nome=document.getElementById('fNome');
    if(!nome||!nome.value.trim()){showToast('Informe o nome do interessado');return false;}
  }
  if(current==='proposta_form'){
    var pNome=document.getElementById('fPropNome');
    if(!pNome||!pNome.value.trim()){showToast('Informe o nome do interessado');return false;}
  }
  if(current==='resultado'&&!S.intencao){showToast('Selecione a intencao do interessado');return false;}
  return true;
}

function coletarDadosPasso(){
  var ps=passos();
  var current=ps[passo];
  if(current==='interessado'){
    S.nome=document.getElementById('fNome').value.trim();
    S.data=document.getElementById('fData').value;
  }
  if(current==='feedback'){
    var obs=document.getElementById('fObs');
    if(obs)S.observacoes=obs.value.trim();
  }
  if(current==='pagamento'){
    var obsP=document.getElementById('fPagtoObs');
    if(obsP)S.pagto_detalhes=obsP.value.trim();
  }
  if(current==='proposta_form'){
    S.nome=document.getElementById('fPropNome').value.trim();
    S.data=document.getElementById('fPropData').value;
    var obsR=document.getElementById('fPropObs');
    if(obsR)S.prop_obs=obsR.value.trim();
  }
}

// --- SALVAR VISITA ---
async function salvarVisita(){
  var btn=document.getElementById('btnSalvarVisita');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  try{
    var parceiroVal=typeof S.parceiro==='string'&&S.parceiro?S.parceiro:null;
    var payload={
      imovel_id:S.imovel.id,
      imovel_nome:S.imovel.nome,
      data_visita:S.data,
      hora_visita:null,
      corretor:S.corretor.nome,
      parceiro:parceiroVal,
      origem:S.origem||null,
      nome_interessado:S.nome,
      objections:S.objections.length?S.objections:null,
      observacoes:S.observacoes||null,
      intencao:S.intencao||null,
      qualificado_financeiramente:S.qualif,
      formas_pagamento:S.pagto.length?S.pagto:null,
      pagto_detalhes:S.pagto_detalhes||null
    };
    var res=await sb.from('visitas').insert(payload);
    if(res.error)throw res.error;
    mostrarSucessoVisita();
  }catch(e){
    showToast('Erro: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='&#10003; Salvar visita';}
  }
}

function mostrarSucessoVisita(){
  document.getElementById('stepBarWrap').classList.add('hidden');
  document.getElementById('footerAcao').classList.add('hidden');
  var page=document.getElementById('mainPage');
  // Se intencao = quer comprar, oferecer registro de proposta
  if(S.intencao==='Quer comprar'){
    page.innerHTML='<div class="success-wrap">'+
      '<div class="success-icon">&#10003;</div>'+
      '<div class="success-title">Visita registrada!</div>'+
      '<div class="success-sub">Visita de '+escHtml(S.nome)+' no '+escHtml(S.imovel.nome)+' salva com sucesso.</div>'+
    '</div>'+
    '<div class="proposta-pos">'+
      '<div class="proposta-pos-title">&#128172; Essa visita gerou uma proposta?</div>'+
      '<div class="proposta-pos-sub">O interessado demonstrou intencao de compra. Quer registrar a proposta agora?</div>'+
      '<div class="proposta-pos-btns">'+
        '<button class="pp-btn pp-sim" onclick="iniciarPropostaPosVisita()">Sim, registrar proposta</button>'+
        '<button class="pp-btn pp-nao" onclick="finalizarSemProposta()">Nao, encerrar</button>'+
      '</div>'+
    '</div>';
  } else {
    page.innerHTML=renderSucesso('Visita registrada com sucesso!','Visita de '+escHtml(S.nome)+' no '+escHtml(S.imovel.nome)+' salva.');
  }
}

function iniciarPropostaPosVisita(){
  S.tipo='proposta';
  S.prop_valor='';S.prop_pagto=null;S.prop_status='em_andamento';S.prop_obs='';
  // Vai direto para proposta_form pulando tipo/imovel/corretor (ja selecionados)
  var ps=PASSOS_PROPOSTA;
  passo=ps.indexOf('proposta_form');
  renderPasso();
}

function finalizarSemProposta(){
  document.getElementById('mainPage').innerHTML=renderSucesso('Registro concluido!','Tudo salvo com sucesso.');
}

// --- SALVAR PROPOSTA ---
async function salvarProposta(){
  var btn=document.querySelector('#mainPage .btn-next.green');
  if(btn){btn.disabled=true;btn.textContent='Salvando...';}
  try{
    var valorRaw=S.prop_valor?parseFloat(S.prop_valor.replace(/\./g,'').replace(',','.'))||null:null;
    var payload={
      imovel_id:S.imovel.id,
      nome_interessado:S.nome,
      data:S.data||null,
      valor_proposto:valorRaw,
      forma_pagamento:S.prop_pagto||null,
      status:S.prop_status||'em_andamento',
      observacao:S.prop_obs||null
    };
    var res=await sb.from('propostas').insert(payload);
    if(res.error)throw res.error;
    document.getElementById('stepBarWrap').classList.add('hidden');
    document.getElementById('footerAcao').classList.add('hidden');
    document.getElementById('mainPage').innerHTML=renderSucesso('Proposta registrada!','Proposta de '+escHtml(S.nome)+' no '+escHtml(S.imovel.nome)+' salva com sucesso.');
  }catch(e){
    showToast('Erro: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='&#10003; Salvar proposta';}
  }
}

  return '<div class="success-wrap">'+
    '<div class="success-icon">&#10003;</div>'+
    '<div class="success-title">'+escHtml(titulo)+'</div>'+
    '<div class="success-sub">'+escHtml(sub)+'</div>'+
    '<button class="novo-btn" onclick="resetar()">&#43; Novo registro</button>'+
    '&nbsp;&nbsp;'+
    '<button class="novo-btn" style="background:var(--bg);color:var(--navy);border:1.5px solid var(--s2)" onclick="irDashboard()">&#127968; Dashboard</button>'+
  '</div>';
}

function resetar(){
  S={tipo:null,imovel:null,corretor:null,parceiro:null,nome:'',data:'',origem:'',objections:[],observacoes:'',intencao:null,qualif:null,pagto:[],pagto_detalhes:'',prop_valor:'',prop_pagto:null,prop_status:'em_andamento',prop_obs:''};
  passo=0;
  renderPasso();
}

function irDashboard(){
  var base=window.location.origin+window.location.pathname.replace('registro.html','');
  window.location.href=base+'index.html';
}

// --- UTILS ---
function hoje(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function escHtml(s){
  if(!s)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2800);
}

// --- START ---
init();
</script>
