<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#191949;--white:#FFFFFF;--bg:#F5F5F8;--text:#191949;--muted:#8E8EA0;--s2:#ECECF1;--s3:#D9D9E3;
  --green:#10B981;--green-bg:rgba(16,185,129,0.08);--green-l:#D1FAE5;
  --red:#EF4444;--red-bg:rgba(239,68,68,0.08);--red-l:#FEE2E2;
  --yellow:#F59E0B;--yellow-bg:rgba(245,158,11,0.08);--yellow-l:#FEF3C7;
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,0.08);--blue-l:#DBEAFE;
  --purple:#8B5CF6;--purple-bg:rgba(139,92,246,0.08);--purple-l:#EDE9FE;
  --gray-bg:#F3F4F6;--gray-text:#374151;
  --navy-l:rgba(25,25,73,0.08);--card-shadow:0 1px 3px rgba(25,25,73,0.06),0 1px 2px rgba(25,25,73,0.04);--card-radius:14px}
html,body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
/* AUTH */
.auth-overlay{position:fixed;inset:0;background:var(--navy);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:340px;text-align:center}
.auth-logo{font-size:13px;font-weight:900;letter-spacing:2.2px;text-transform:uppercase;color:var(--navy);margin-bottom:4px}
.auth-sub{font-size:9px;color:#8E8EA0;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:28px}
.auth-lbl{font-size:11px;font-weight:700;color:var(--navy);text-align:left;margin-bottom:4px;display:block}
.auth-input{width:100%;border:1.5px solid #ECECF1;border-radius:12px;padding:14px 16px;font-size:14px;font-family:'Nunito Sans',sans-serif;color:var(--navy);outline:none;text-align:left;margin-bottom:10px;-webkit-appearance:none;background:#fff}
.auth-input:focus{border-color:var(--navy)}
.auth-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;font-family:'Nunito Sans',sans-serif;cursor:pointer;margin-top:2px}
.auth-btn:disabled{opacity:0.6;cursor:not-allowed}
.auth-err{font-size:12px;color:#EF4444;font-weight:700;margin-top:10px;min-height:18px}
.auth-link{font-size:11px;color:#8E8EA0;cursor:pointer;margin-top:14px;display:block;font-weight:700}
.auth-link:hover{color:var(--navy)}
/* APP */
.app-wrap{display:block}
.page{padding:14px 16px 60px;max-width:480px;margin:0 auto}
@media(min-width:900px){
  .page{flex:1;max-width:none;min-width:0;padding:20px 0 40px 28px}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:50px 20px}
.loading-spin{width:28px;height:28px;border:3px solid var(--s2);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
.loading-txt{font-size:12px;color:var(--muted)}
.erro-box{background:var(--red-bg);border-radius:12px;padding:18px;margin:20px 0;text-align:center}
.erro-box p{font-size:12px;color:var(--red)}
.erro-box button{margin-top:10px;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;font-family:'Nunito Sans',sans-serif;cursor:pointer}
/* CARDS E BASE */
.card{background:var(--white);border-radius:var(--card-radius);padding:16px 18px;border:1px solid var(--s2);box-shadow:var(--card-shadow);margin-bottom:12px}
.card-navy{background:var(--navy);border-radius:var(--card-radius);padding:18px 20px;border:none;margin-bottom:14px;color:#fff}
.lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.pill{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.pill-green{color:var(--green);background:var(--green-bg)}
.pill-red{color:var(--red);background:var(--red-bg)}
.pill-yellow{color:var(--yellow);background:var(--yellow-bg)}
.pill-blue{color:var(--blue);background:var(--blue-bg)}
.pill-purple{color:var(--purple);background:var(--purple-bg)}
.stats-row{display:flex;gap:8px;margin-bottom:14px}
.stat-box{flex:1;text-align:center;background:var(--white);border-radius:12px;padding:12px 6px;border:1px solid var(--s2)}
.stat-n{font-size:22px;font-weight:900;line-height:1}
.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px}
.view{display:none}
.view.on{display:block}
/* BADGES */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge-ativa{background:var(--green-l);color:#065F46}
.badge-vendida{background:var(--blue-l);color:#1E40AF}
.badge-perdida{background:var(--red-l);color:#991B1B}
.badge-gestao{background:var(--purple-l);color:#5B21B6}
.badge-repaginando{background:var(--yellow-l);color:#92400E}
.badge-aguardando{background:var(--gray-bg);color:#374151}
/* PIPELINE HEADER */
.pipeline-header{background:var(--navy);color:#fff;border-radius:var(--card-radius);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.ph-counters{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;flex-wrap:wrap}
.ph-counter-sep{color:rgba(255,255,255,0.3);font-weight:400}
.ph-count-ativa{color:#fff}
.ph-count-repag{color:var(--yellow)}
.ph-count-aguard{color:rgba(255,255,255,0.7)}
.ph-tmm{flex:1;min-width:220px;display:flex;flex-direction:column;gap:6px}
.ph-tmm-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
.ph-tmm-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.65);text-transform:uppercase;letter-spacing:0.08em}
.ph-tmm-val{font-size:20px;font-weight:900;color:#fff;line-height:1}
.ph-tmm-pct{font-size:18px;font-weight:900}
.ph-bar{height:7px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden}
.ph-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.ph-bar-fill.c-green{background:var(--green)}
.ph-bar-fill.c-yellow{background:var(--yellow)}
.ph-bar-fill.c-red{background:var(--red)}
.ph-future{display:flex;flex-direction:column;gap:4px}
.ph-future-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.65);text-transform:uppercase;letter-spacing:0.08em}
.ph-future-val{font-size:15px;font-weight:800;color:var(--yellow)}
.ph-nova{background:#fff;color:var(--navy);border:none;border-radius:10px;padding:10px 16px;font-size:12px;font-weight:800;font-family:'Nunito Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.ph-nova:hover{opacity:0.92}
@media(max-width:899px){
  .pipeline-header{gap:12px}
  .ph-tmm{flex-basis:100%;order:2}
  .ph-future{order:3}
  .ph-nova{order:4;margin-left:auto}
}
/* GRUPOS */
.group-header{display:flex;align-items:center;gap:10px;margin:22px 0 10px;padding:0 2px;cursor:default}
.group-header.collapsible{cursor:pointer}
.group-title{font-size:11px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:1.2px}
.group-count{font-size:11px;font-weight:700;color:var(--muted)}
.group-arrow{margin-left:auto;color:var(--muted);font-size:16px;transition:transform .2s}
.group-arrow.open{transform:rotate(90deg)}
.group-badge{font-size:9px;font-weight:800;padding:2px 8px;border-radius:10px;background:var(--purple-l);color:#5B21B6;text-transform:uppercase;letter-spacing:0.08em}
.group-body{display:grid;gap:12px;grid-template-columns:1fr}
.group-body.cols-3{grid-template-columns:1fr}
.group-body.cols-2{grid-template-columns:1fr}
@media(min-width:900px){
  .group-body.cols-3{grid-template-columns:repeat(3,1fr)}
  .group-body.cols-2{grid-template-columns:repeat(2,1fr)}
}
.group-empty{font-size:12px;color:var(--muted);font-weight:600;padding:16px;background:var(--white);border:1px dashed var(--s2);border-radius:var(--card-radius);text-align:center}
/* ICARD (v10) */
.icard{background:var(--white);border-radius:var(--card-radius);padding:14px 16px 12px;border:1px solid var(--s2);border-left:4px solid var(--s3);box-shadow:var(--card-shadow);cursor:pointer;transition:box-shadow .15s,transform .15s;animation:fadeUp .25s ease both}
.icard:hover{box-shadow:0 4px 14px rgba(25,25,73,0.08);transform:translateY(-1px)}
.icard.b-green{border-left-color:var(--green)}
.icard.b-yellow{border-left-color:var(--yellow)}
.icard.b-red{border-left-color:var(--red)}
.icard-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.icard-nome{font-size:13px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:0.3px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icard-preco{font-size:13px;font-weight:800;color:var(--navy);white-space:nowrap}
.icard-sub{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.icard-sub-prop{font-size:11px;color:var(--muted);font-weight:700}
.icard-tmm{font-size:11px;color:var(--navy);font-weight:700}
.icard-tmm-pct{font-size:10px;color:var(--muted);font-weight:600;margin-left:4px}
.icard-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.icard-bar-lbl{width:58px;flex-shrink:0;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
.icard-bar-wrap{flex:1;height:7px;background:var(--s2);border-radius:4px;position:relative;overflow:hidden}
.icard-bar-bg{position:absolute;top:0;left:0;height:100%;border-radius:4px}
.icard-bar-fill{position:absolute;top:0;left:0;height:100%;border-radius:4px;transition:width .3s ease}
.icard-bar-marker{position:absolute;top:-1px;bottom:-1px;width:2px;background:var(--navy);border-radius:1px}
.icard-bar-nums{width:62px;flex-shrink:0;text-align:right;font-size:10px;font-weight:700;color:var(--navy)}
.icard-bar-nums .num-exp{color:var(--muted);font-weight:600}
.icard-bar-fill.s-green{background:var(--green)}
.icard-bar-fill.s-yellow{background:var(--yellow)}
.icard-bar-fill.s-red{background:var(--red)}
.icard-bar-fill.s-navy{background:rgba(25,25,73,0.35)}
.icard-bar-bg.s-green{background:rgba(16,185,129,0.18)}
.icard-bar-bg.s-yellow{background:rgba(245,158,11,0.18)}
.icard-bar-bg.s-red{background:rgba(239,68,68,0.18)}
.icard-media-row{margin-top:10px;padding-top:10px;border-top:1px solid var(--s2);font-size:11px;color:var(--muted);font-weight:600;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
.icard-media-row strong{color:var(--navy);font-weight:800}
.icard-actions{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid var(--s2)}
.icard-actions-spacer{flex:1}
.btn-mini{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;font-family:'Nunito Sans',sans-serif;cursor:pointer}
.btn-mini.blue{background:var(--blue)}
.btn-mini:hover{opacity:0.92}
/* CARDS RESUMIDOS (repaginando / aguardando) */
.icard-resumido{background:var(--white);border-radius:var(--card-radius);padding:12px 14px;border:1px solid var(--s2);border-left:4px solid var(--s3);box-shadow:var(--card-shadow);cursor:pointer;transition:box-shadow .15s}
.icard-resumido.b-yellow{border-left-color:var(--yellow)}
.icard-resumido.b-gray{border-left-color:#9CA3AF}
.icard-resumido:hover{box-shadow:0 4px 14px rgba(25,25,73,0.08)}
.icardr-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.icardr-nome{font-size:12px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:0.3px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icardr-preco{font-size:12px;font-weight:800;color:var(--navy);white-space:nowrap}
.icardr-meta{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.icardr-progress{height:5px;background:var(--s2);border-radius:3px;overflow:hidden;margin-bottom:8px}
.icardr-progress-fill{height:100%;background:var(--yellow);border-radius:3px}
/* CARDS HISTORICOS (vendidas / perdidas) */
.card-historico{background:var(--white);border-radius:12px;padding:10px 12px;border:1px solid var(--s2);border-left:3px solid var(--s3);display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--text);font-weight:600}
.card-historico.b-blue{border-left-color:var(--blue)}
.card-historico.b-red{border-left-color:var(--red)}
.card-historico strong{color:var(--navy);font-weight:800}
.card-historico .hist-sep{color:var(--s3)}
/* TOAST */
.save-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-size:13px;font-weight:700;padding:12px 24px;border-radius:12px;z-index:800;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(25,25,73,0.25)}
.save-toast.show{opacity:1}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>

<script>

var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0eWt6cmFsa3hsYnFxa2xlb2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjMyNjAsImV4cCI6MjA4OTkzOTI2MH0.rYBifw2NXqVDGrKbDWKJgrFAIdoruxxsIPc9RXibgy0';

// --- UTILS BASICOS ---
function showToast(msg){
  var t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.className='save-toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');

function switchView(id){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on');});
  var el=document.getElementById(id);
  if(el){el.classList.add('on');window.scrollTo({top:0});}
}

// --- HELPERS DE CALCULO (reusados do index.html) ---
function parsePrecM(preco){
  var s=(preco||'').trim();
  if(s.toUpperCase().indexOf('M')>=0){return parseFloat(s.replace(/[^\d,]/g,'').replace(',','.'))||0;}
  var clean=s.replace(/[R$\s]/g,'');
  var raw;
  if(clean.indexOf(',')>=0){raw=parseFloat(clean.replace(/\./g,'').replace(',','.'))||0;}
  else{
    var dots=(clean.match(/\./g)||[]).length;
    if(dots>1){raw=parseFloat(clean.replace(/\./g,''))||0;}
    else if(dots===1){var pts=clean.split('.');raw=pts[1]&&pts[1].length===3?parseFloat(clean.replace(/\./g,''))||0:parseFloat(clean)||0;}
    else{raw=parseFloat(clean)||0;}
  }
  return raw>=1000?raw/1000000:raw;
}
function diffDias(d1,d2){if(!d1||!d2)return null;return Math.round((new Date(d2+'T00:00:00')-new Date(d1+'T00:00:00'))/86400000);}
function calcMetaInterna(im){
  if(!im.data_midia_entregue||!im.prazo_interno_dias)return null;
  var d=new Date(im.data_midia_entregue+'T00:00:00');
  d.setDate(d.getDate()+parseInt(im.prazo_interno_dias));
  return d.toISOString().split('T')[0];
}
function fmtM(v){
  if(v>=1000000)return 'R$ '+(v/1000000).toFixed(1).replace('.',',')+'M';
  if(v>=1000)return 'R$ '+(v/1000).toFixed(0)+'K';
  return 'R$ '+v.toLocaleString('pt-BR');
}
function fmtTMMK(v){
  if(v>=1000000)return 'R$'+(v/1000000).toFixed(1).replace('.',',')+'M';
  if(v>=1000)return 'R$'+(v/1000).toFixed(0)+'K';
  return 'R$'+Math.round(v);
}
function toggleSecao(listId,btn){
  var list=document.getElementById(listId);
  var arrow=btn?btn.querySelector('span:last-child'):null;
  if(list.style.display==='none'){list.style.display='block';if(arrow)arrow.textContent='\u2039';}
  else{list.style.display='none';if(arrow)arrow.textContent='\u203A';}
}
function dismissAlerta(key){
  var dismissed=JSON.parse(localStorage.getItem('alertas_dismissed')||'[]');
  if(dismissed.indexOf(key)<0)dismissed.push(key);
  localStorage.setItem('alertas_dismissed',JSON.stringify(dismissed));
  renderAlertas();
}

// --- TMM / SEMAFORO ---
var TMM_META=5800000;
function diasTipo(im){
  var tipo=(im.tipo_imovel||'').toLowerCase();
  if(tipo.indexOf('repag')>=0)return 40;
  if(tipo.indexOf('mob')>=0)return 80;
  return 120;
}
function calcTMM(im){
  var pr=parsePrecM(im.preco)*1000000;
  var d=diasTipo(im);
  var tmm=pr/(d/30);
  if(im.status_exclusividade==='gestao')tmm=tmm/5;
  return tmm;
}
function sem(real,esperado){
  if(!esperado||esperado<=0)return 999;
  return (real/esperado)*100;
}
function semColor(pct){
  if(pct>=100)return 'green';
  if(pct>=80)return 'yellow';
  return 'red';
}

// --- RENDER BLOCO B: PIPELINE HEADER (contadores + TMM + meta + futuro + nova) ---
function renderHeader(){
  var ativas=imoveis.filter(function(x){return x.status_exclusividade==='ativa';});
  var gestao=imoveis.filter(function(x){return x.status_exclusividade==='gestao';});
  var repag=imoveis.filter(function(x){return x.status_exclusividade==='repaginando';});
  var aguard=imoveis.filter(function(x){return x.status_exclusividade==='aguardando';});
  var tmmAtivo=0;
  ativas.forEach(function(im){tmmAtivo+=calcTMM(im);});
  gestao.forEach(function(im){tmmAtivo+=calcTMM(im);});
  var tmmFuturo=0;
  repag.forEach(function(im){tmmFuturo+=calcTMM(im);});
  aguard.forEach(function(im){tmmFuturo+=calcTMM(im);});
  var pct=Math.round(tmmAtivo/TMM_META*100);
  var pctBarra=Math.min(100,Math.max(0,pct));
  var corBar=pct>=100?'c-green':(pct>=70?'c-yellow':'c-red');
  var corPct=pct>=100?'var(--green)':(pct>=70?'var(--yellow)':'var(--red)');
  var html='<div class="pipeline-header">'
    +'<div class="ph-counters">'
      +'<span class="ph-count-ativa">'+ativas.length+' ativas</span>'
      +'<span class="ph-counter-sep">-</span>'
      +'<span class="ph-count-repag">'+repag.length+' repag.</span>'
      +'<span class="ph-counter-sep">-</span>'
      +'<span class="ph-count-aguard">'+aguard.length+' aguar.</span>'
    +'</div>'
    +'<div class="ph-tmm">'
      +'<div class="ph-tmm-top">'
        +'<span><span class="ph-tmm-lbl">TMM</span> <span class="ph-tmm-val">'+fmtM(Math.round(tmmAtivo))+'</span></span>'
        +'<span class="ph-tmm-pct" style="color:'+corPct+'">'+pct+'%</span>'
      +'</div>'
      +'<div class="ph-bar"><div class="ph-bar-fill '+corBar+'" style="width:'+pctBarra+'%"></div></div>'
    +'</div>'
    +'<div class="ph-future">'
      +'<span class="ph-future-lbl">Pipeline futuro</span>'
      +'<span class="ph-future-val">+'+fmtM(Math.round(tmmFuturo))+'/mes</span>'
    +'</div>'
    +'<button class="ph-nova" onclick="window.location.href=\'exclusividades.html\'">+ Nova exclusividade</button>'
  +'</div>';
  document.getElementById('pipelineHeader').innerHTML=html;
}

// --- RENDER BLOCO A: DASHBOARD EXECUTIVO (VGV + stats + banner) ---
function renderDashboard(){
  var ativas=imoveis.filter(function(x){return x.status_exclusividade==='ativa';});
  var gestao=imoveis.filter(function(x){return x.status_exclusividade==='gestao';});
  var repag=imoveis.filter(function(x){return x.status_exclusividade==='repaginando';});
  var aguard=imoveis.filter(function(x){return x.status_exclusividade==='aguardando';});
  var vendidas=imoveis.filter(function(x){return x.status_exclusividade==='vendida';});
  var vgv=ativas.concat(gestao).reduce(function(s,x){return s+(parsePrecM(x.preco)||0);},0);
  var alertasCnt=0;
  var hj=new Date();hj.setHours(0,0,0,0);
  imoveis.forEach(function(im){
    if(im.status_exclusividade!=='ativa')return;
    if(!im.data_fim)return;
    var fim=new Date(im.data_fim+'T00:00:00');
    var diff=Math.round((fim-hj)/86400000);
    if(diff>=0&&diff<=30)alertasCnt++;
  });
  var diasPT={'Repaginado':40,'Mobiliado':80,'Vazio':120};
  var tmmGestao=gestao.reduce(function(s,im){var pr=parsePrecM(im.preco)*1000000;var d=diasPT[im.tipo_imovel]||120;return s+(pr/(d/30)/5);},0);
  var html='<div class="card-navy" style="margin-bottom:14px">'
    +'<div class="lbl">VGV em carteira</div>'
    +'<div style="font-size:32px;font-weight:900;color:#fff;line-height:1">'+fmtM(Math.round(vgv*1000000))+'</div>'
    +'<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px">'+ativas.length+' exclusividade'+(ativas.length===1?'':'s')+' ativa'+(ativas.length===1?'':'s')+'</div>'
    +'</div>';
  html+='<div class="stats-row" style="margin-bottom:14px">'
    +'<div class="stat-box"><div class="stat-n">'+ativas.length+'</div><div class="stat-l">Em Campanha</div></div>'
    +(gestao.length?'<div class="stat-box" style="border-color:#8B5CF6;background:#EDE9FE"><div class="stat-n" style="color:#5B21B6">'+gestao.length+'</div><div class="stat-l" style="color:#5B21B6">Gestao</div>'+(tmmGestao>0?'<div style="font-size:9px;color:#7C3AED;margin-top:2px">'+fmtTMMK(tmmGestao)+'/mes</div>':'')+'</div>':'')
    +'<div class="stat-box"><div class="stat-n">'+repag.length+'</div><div class="stat-l">Repaginando</div></div>'
    +'<div class="stat-box"><div class="stat-n">'+aguard.length+'</div><div class="stat-l">Aguardando</div></div>'
    +'<div class="stat-box"><div class="stat-n">'+vendidas.length+'</div><div class="stat-l">Vendidas</div></div>'
    +'</div>';
  if(alertasCnt>0){
    html+='<div class="card" style="border-left:3px solid var(--red);margin-bottom:12px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center">'
      +'<div><div style="font-size:13px;font-weight:800;color:var(--red)">'+alertasCnt+' alerta'+(alertasCnt===1?'':'s')+' de prazo</div>'
      +'<div style="font-size:11px;color:var(--muted);margin-top:2px">Exclusividades vencendo em 30 dias</div></div>'
      +'<button onclick="switchView(\'vAlertas\')" style="background:var(--red-bg);color:var(--red);border:none;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:800;font-family:\'Nunito Sans\',sans-serif;cursor:pointer">Ver</button>'
      +'</div>'
      +'</div>';
  }
  document.getElementById('pipelineContent').innerHTML=html;
}

// --- RENDER ALERTAS (guard de ativa aplicado) ---
function renderAlertas(){
  var hj=new Date();hj.setHours(0,0,0,0);
  var dismissed=JSON.parse(localStorage.getItem('alertas_dismissed')||'[]');
  var groups=[];
  imoveis.forEach(function(im){
    if(im.status_exclusividade!=='ativa')return;
    var nome=(im.nome||'').toUpperCase();
    var alerts=[];
    function addAlert(nivel,msg,key){if(dismissed.indexOf(key)>=0)return;alerts.push({nivel:nivel,msg:msg,key:key});}
    var dataFimD=im.data_fim?new Date(im.data_fim+'T00:00:00'):null;
    var diasRest=dataFimD?Math.round((dataFimD-hj)/86400000):999;
    var metaInt=calcMetaInterna(im);
    if(diasRest<=30&&diasRest>0)addAlert('critico',diasRest+'d restantes de contrato','fim_'+im.id);
    if(diasRest<=0)addAlert('critico','contrato vencido ha '+Math.abs(diasRest)+'d','venc_'+im.id);
    if(metaInt&&Math.round((new Date(metaInt+'T00:00:00')-hj)/86400000)<=0)addAlert('critico','meta interna ultrapassada','metaint_'+im.id);
    if((im.total_visitas||0)===0&&im.data_midia_entregue)addAlert('atencao','campanha no ar sem visita','semvisita_'+im.id);
    if((im.total_propostas||0)===0&&(im.total_visitas||0)>=3)addAlert('atencao',(im.total_visitas)+'visitas sem proposta','semproposta_'+im.id);
    if(!im.data_gravacao_conteudo&&im.data_inicio){
      var diasSemGrav=diffDias(im.data_inicio,hj.toISOString().split('T')[0]);
      if(diasSemGrav>30)addAlert('atencao',diasSemGrav+'d sem gravacao de conteudo','semgrav_'+im.id);
    }
    if(alerts.length)groups.push({nome:nome,alerts:alerts,id:im.id});
  });
  var nc=0,na=0;
  groups.forEach(function(g){g.alerts.forEach(function(a){if(a.nivel==='critico')nc++;else na++;});});
  var html='<div class="stats-row"><div class="stat-box" style="'+(nc>0?'background:var(--red-bg);border-color:var(--red-l)':'')+'"><div class="stat-n" style="color:'+(nc>0?'var(--red)':'var(--green)')+'">'+nc+'</div><div class="stat-l">Critico</div></div><div class="stat-box" style="'+(na>0?'background:var(--yellow-bg);border-color:var(--yellow-l)':'')+'"><div class="stat-n" style="color:'+(na>0?'var(--yellow)':'var(--green)')+'">'+na+'</div><div class="stat-l">Atencao</div></div></div>';
  groups.forEach(function(g){
    var gnc=g.alerts.filter(function(a){return a.nivel==='critico';}).length;
    var gna=g.alerts.filter(function(a){return a.nivel==='atencao';}).length;
    var gid='alertGrp_'+g.id;
    html+='<div class="card" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding-bottom:10px" onclick="toggleSecao(\''+gid+'\',this)"><div><div style="font-size:13px;font-weight:800;color:var(--navy)">'+g.nome+'</div><div style="display:flex;gap:6px;margin-top:4px">'+(gnc?'<span class="pill pill-red">'+gnc+' critico</span>':'')+(gna?'<span class="pill pill-yellow">'+gna+' atencao</span>':'')+'</div></div><span style="color:var(--muted);font-size:18px">\u203A</span></div><div id="'+gid+'" style="display:none;border-top:1px solid var(--s2);padding-top:10px">';
    g.alerts.forEach(function(a){
      var cor=a.nivel==='critico'?'var(--red)':'var(--yellow)';
      html+='<div id="alertrow_'+a.key+'" style="display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--s2)"><div style="display:flex;align-items:flex-start;gap:8px;flex:1"><div style="width:8px;height:8px;border-radius:50%;background:'+cor+';flex-shrink:0;margin-top:4px"></div><div style="font-size:12px;font-weight:600;color:var(--text);line-height:1.4">'+a.msg+'</div></div><button onclick="dismissAlerta(\''+a.key+'\')" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 0 0 10px;line-height:1;flex-shrink:0">\u00d7</button></div>';
    });
    html+='</div></div>';
  });
  if(!groups.length)html+='<div class="card" style="text-align:center;padding:40px"><div style="font-size:32px;margin-bottom:8px;color:var(--green)">\u2713</div><div style="font-size:14px;font-weight:800;color:var(--green)">Tudo dentro da meta</div></div>';
  document.getElementById('vAlertas').innerHTML=html;
}

// --- HASH ROUTING (redireciona detalhe/editar para exclusividades.html) ---
function handleHash(){
  var h=window.location.hash||'';
  if(h.indexOf('#detalhe/')===0){
    window.location.href='exclusividades.html'+h;
    return;
  }
  if(h.indexOf('#editar/')===0){
    window.location.href='exclusividades.html'+h;
    return;
  }
  if(h==='#alertas'){
    switchView('vAlertas');
    return;
  }
  // default: lista (pipeline + dashboard)
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on');});
}

// --- AUTH ---
async function loginUser(){
  var email=document.getElementById('authEmail').value.trim();
  var senha=document.getElementById('authSenha').value;
  var btn=document.getElementById('authBtn');
  var err=document.getElementById('authErr');
  err.textContent='';
  if(!email||!senha){err.textContent='Preencha email e senha.';return;}
  btn.disabled=true;btn.textContent='Entrando...';
  try{
    var res=await sb.auth.signInWithPassword({email:email,password:senha});
    if(res.error)throw res.error;
  }catch(e){
    err.textContent=e.message||'Erro ao entrar.';
    btn.disabled=false;btn.textContent='Entrar';
  }
}
async function recuperarSenha(){
  var email=document.getElementById('authEmail').value.trim();
  if(!email){document.getElementById('authErr').textContent='Digite seu email acima primeiro.';return;}
  var res=await sb.auth.resetPasswordForEmail(email);
  if(res.error){document.getElementById('authErr').textContent=res.error.message;}
  else{
    document.getElementById('authErr').style.color='#10B981';
    document.getElementById('authErr').textContent='Email de recupera\u00e7\u00e3o enviado!';
  }
}
async function logoutUser(){
  await sb.auth.signOut();
  currentUser=null;currentRole='padrao';currentNome='';currentUsuarioId=null;
  document.getElementById('authOverlay').style.display='flex';
  document.getElementById('authBtn').disabled=false;
  document.getElementById('authBtn').textContent='Entrar';
  document.getElementById('authEmail').value='';
  document.getElementById('authSenha').value='';
  document.getElementById('authErr').textContent='';
}
window.logoutUser=logoutUser;

async function onLogin(user){
  currentUser=user;
  var pr=await sb.from('usuarios').select('*').eq('auth_id',user.id).single();
  if(pr.data){currentRole=pr.data.role||'padrao';currentNome=pr.data.nome||user.email;currentUsuarioId=pr.data.id;}
  else{currentRole='padrao';currentNome=user.email;}
  CertNav.init('pipeline');
  CertNav.setUser(currentNome,currentRole);
  document.getElementById('authOverlay').style.display='none';
  loadPipeline();
  handleHash();
}

// --- DATA (esbo\u00e7o vazio na FASE 1) ---
async function loadPipeline(){
  var host=document.getElementById('pipelineContent');
  host.innerHTML='<div class="loading"><div class="loading-spin"></div><div class="loading-txt">Carregando...</div></div>';
  try{
    var res=await sb.from('dashboard_imoveis').select('*').order('dias_restantes',{ascending:true});
    if(res.error)throw res.error;
    imoveis=res.data||[];
    renderHeader();
    renderDashboard();
    renderAlertas();
  }catch(err){
    host.innerHTML='<div class="erro-box"><p>Erro: '+err.message+'</p><button onclick="loadPipeline()">Tentar novamente</button></div>';
  }
}

// --- INIT ---
sb.auth.onAuthStateChange(function(event,session){
  if((event==='SIGNED_IN'||event==='INITIAL_SESSION')&&session&&session.user){
    onLogin(session.user);
  }else if(event==='SIGNED_OUT'){
    document.getElementById('authOverlay').style.display='flex';
  }
});
(function(){
  sb.auth.getSession().then(function(r){
    if(!r.data.session){document.getElementById('authOverlay').style.display='flex';}
  });
})();
window.addEventListener('hashchange',handleHash);
</script>
