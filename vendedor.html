<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Relatório de Vendas — Gabriel Certeiro Imóveis</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#191949;
  --white:#FFFFFF;
  --bg:#F5F5F8;
  --text:#191949;
  --muted:#8E8EA0;
  --s2:#ECECF1;
  --s3:#D9D9E3;
  --green:#10B981;
  --green-bg:rgba(16,185,129,0.08);
  --green-l:#D1FAE5;
  --red:#EF4444;
  --red-bg:rgba(239,68,68,0.08);
  --red-l:#FEE2E2;
  --yellow:#F59E0B;
  --yellow-bg:rgba(245,158,11,0.08);
  --yellow-l:#FEF3C7;
  --blue:#3B82F6;
  --blue-bg:rgba(59,130,246,0.08);
  --blue-l:#DBEAFE;
  --navy-l:rgba(25,25,73,0.08);
  --gold:#B8922A;
  --gold-bg:rgba(184,146,42,0.06);
  --card-shadow:0 1px 3px rgba(25,25,73,0.06),0 1px 2px rgba(25,25,73,0.04);
  --card-radius:14px;
}
html,body{
  font-family:'Nunito Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
.hdr{background:var(--navy);padding:18px 20px 16px;text-align:center;position:sticky;top:0;z-index:200}
.hdr-brand{color:#fff;font-size:13px;font-weight:900;letter-spacing:2.4px;text-transform:uppercase}
.hdr-sub{color:rgba(255,255,255,0.35);font-size:8px;letter-spacing:1.8px;text-transform:uppercase;margin-top:3px}
.hdr-badge{display:inline-block;margin-top:8px;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:4px 12px;border-radius:20px}
.page{padding:16px 16px 40px;max-width:480px;margin:0 auto}
.card-hero{background:var(--navy);border-radius:var(--card-radius);padding:22px 20px;border:none;margin-bottom:14px;position:relative;overflow:hidden}
.card-hero::after{content:'';position:absolute;top:-30%;right:-10%;width:180px;height:180px;background:radial-gradient(circle,rgba(184,146,42,0.08) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.pill{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.pill-green{color:var(--green);background:var(--green-bg)}.pill-navy{color:var(--navy);background:var(--navy-l)}.pill-muted{color:var(--muted);background:var(--s2)}.pill-gold{color:var(--gold);background:var(--gold-bg);border:1px solid rgba(184,146,42,0.15)}
.tl-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.tl-lbl{font-size:9px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted)}.tl-rest{font-size:11px;font-weight:700}.tl-row{margin-bottom:5px}.tl-rlbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}.tl-track{position:relative;background:var(--s2);border-radius:4px;height:7px;overflow:visible}.tl-fill{height:100%;border-radius:4px}.tl-marker{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--navy);border-radius:2px}.tl-hoje{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:7.5px;font-weight:700;color:var(--navy);white-space:nowrap}
.tl-horiz{margin:12px 0 0;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}.tl-horiz-inner{display:flex;align-items:flex-start;min-width:max-content;padding:0 2px}.tl-node{display:flex;flex-direction:column;align-items:center;min-width:64px}.tl-node-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:4px;box-shadow:0 0 0 3px var(--bg)}.tl-node-dot.ok{background:var(--green)}.tl-node-dot.pendente{background:var(--s3)}.tl-node-dot.atrasado{background:var(--red)}.tl-node-lbl{font-size:8.5px;font-weight:700;color:var(--text);text-align:center;margin-top:5px;line-height:1.2;max-width:60px}.tl-node-data{font-size:8px;color:var(--muted);text-align:center;margin-top:2px}.tl-connector{display:flex;flex-direction:column;align-items:center;padding-top:8px}.tl-line{height:2px;background:var(--s2);flex:1;min-width:18px}.tl-line.ok{background:var(--green)}.tl-interval{font-size:7.5px;color:var(--muted);margin-top:3px;white-space:nowrap}
.funil-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}.funil-lbl{width:70px;font-size:11px;font-weight:600;flex-shrink:0}.funil-bar{flex:1}.funil-nums{font-size:12px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:4px}.funil-target{color:var(--muted);font-weight:400;font-size:11px}.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.bar-bg{background:var(--s2);border-radius:4px;height:6px;overflow:hidden}.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.mbox-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}.mbox{background:var(--bg);border-radius:10px;padding:11px 12px}.mbox-lbl{font-size:8.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}.mbox-val{font-size:15px;font-weight:800}
.vis-item{padding:12px 0;border-bottom:1px solid var(--s2)}.vis-item:first-child{padding-top:0}.vis-item:last-child{border-bottom:none;padding-bottom:0}.vis-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}.vis-left{display:flex;align-items:center;gap:9px}.vis-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}.vis-name{font-size:13px;font-weight:700}.vis-date{font-size:11px;color:var(--muted);margin-top:1px}.vis-badge{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px}.vis-badge.sem_proposta{background:var(--yellow-l);color:#92400e}.vis-badge.proposta_gerada{background:var(--green-l);color:#065f46}.vis-obs{font-size:12px;color:#3a4550;background:var(--bg);border-radius:8px;padding:9px 11px;line-height:1.5;margin-top:6px}.vis-empty{font-size:12px;color:var(--muted);padding:8px 0;text-align:center}
.scard{background:var(--white);border-radius:var(--card-radius);padding:16px 18px;margin-bottom:12px;box-shadow:var(--card-shadow);border:1px solid var(--s2)}.scard-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.footer{text-align:center;padding:24px 16px 16px;border-top:1px solid var(--s2);margin-top:12px}.footer-brand{font-size:11px;font-weight:800;color:var(--navy);letter-spacing:1.6px;text-transform:uppercase}.footer-sub{font-size:10px;color:var(--muted);margin-top:4px}.footer-link{display:inline-block;margin-top:10px;font-size:11px;color:var(--gold);font-weight:700;text-decoration:none}
.copy-bar{background:var(--white);border-bottom:1px solid var(--s2);padding:10px 16px;text-align:center;position:sticky;top:58px;z-index:190;box-shadow:0 2px 6px rgba(25,25,73,0.04)}.copy-btn{display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:12px;font-weight:700;font-family:'Nunito Sans',sans-serif;cursor:pointer;transition:opacity .15s}.copy-btn:active{opacity:0.8}.copy-btn svg{flex-shrink:0}.copy-toast{margin-top:6px;font-size:11px;font-weight:700;color:var(--green);opacity:0;transition:opacity .25s;height:0;overflow:hidden}.copy-toast.show{opacity:1;height:auto}
.loading{text-align:center;padding:60px 20px}.loading-spin{width:28px;height:28px;border:3px solid var(--s2);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}@keyframes spin{to{transform:rotate(360deg)}}.loading-txt{font-size:12px;color:var(--muted)}
.erro-box{background:var(--red-bg);border-radius:12px;padding:24px;margin:30px 16px;text-align:center}.erro-box p{font-size:13px;color:var(--red);font-weight:600}
.updated-at{text-align:center;font-size:10px;color:var(--muted);margin-bottom:16px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeUp .4s ease both}.fade-in-d1{animation-delay:.05s}.fade-in-d2{animation-delay:.1s}.fade-in-d3{animation-delay:.15s}.fade-in-d4{animation-delay:.2s}.fade-in-d5{animation-delay:.25s}.fade-in-d6{animation-delay:.3s}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-brand">Gabriel Certeiro</div>
  <div class="hdr-sub">Imóveis de Alto Padrão · Itajaí/SC</div>
  <div class="hdr-badge">Relatório de Vendas</div>
</div>
<div class="copy-bar" id="copyBar">
  <button class="copy-btn" onclick="copyLink()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    Copiar link para o vendedor
  </button>
  <div class="copy-toast" id="copyToast">Link copiado!</div>
</div>
<div class="page" id="main">
  <div class="loading"><div class="loading-spin"></div><div class="loading-txt">Carregando relatório...</div></div>
</div>
<script>
var SUPA_URL='https://vtykzralkxlbqqkleofl.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0eWt6cmFsa3hsYnFxa2xlb2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjMyNjAsImV4cCI6MjA4OTkzOTI2MH0.rYBifw2NXqVDGrKbDWKJgrFAIdoruxxsIPc9RXibgy0';
var sb=supabase.createClient(SUPA_URL,SUPA_KEY);

function pct(a,m){return m>0?Math.min((a/m)*100,100):0;}
function fmtD(s){if(!s)return'-';var d=new Date(s+'T00:00:00');return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function fmtDShort(s){if(!s)return'-';var d=new Date(s+'T00:00:00');return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');}
function avatarCor(n){var c=['#10B981','#3B82F6','#8B5CF6','#F59E0B','#191949','#06B6D4'],h=0;for(var i=0;i<(n||'?').length;i++)h=(n||'?').charCodeAt(i)+((h<<5)-h);return c[Math.abs(h)%c.length];}
function inicial(n){return(n||'?').charAt(0).toUpperCase();}
function diffDias(d1,d2){if(!d1||!d2)return null;return Math.round((new Date(d2+'T00:00:00')-new Date(d1+'T00:00:00'))/86400000);}
function calcMetaInterna(im){if(!im.data_midia_entregue||!im.prazo_interno_dias)return null;var d=new Date(im.data_midia_entregue+'T00:00:00');d.setDate(d.getDate()+parseInt(im.prazo_interno_dias));return d.toISOString().split('T')[0];}

function tlHtml(im){
  var hPct=Math.min(parseFloat(im.tl_hoje_pct)||0,100);
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var dataFimD=im.data_fim?new Date(im.data_fim+'T00:00:00'):null;
  var diffReal=dataFimD?Math.round((hoje-dataFimD)/86400000):0;
  var restLabel=!dataFimD?'-':diffReal<=0?Math.abs(diffReal)+' dias restantes':diffReal+' dias além do prazo';
  var restColor=!dataFimD?'var(--muted)':diffReal>0?'var(--red)':diffReal<=15?'var(--yellow)':'var(--green)';
  var barColor=!dataFimD?'var(--muted)':diffReal>0?'var(--red)':diffReal<=15?'var(--yellow)':'var(--green)';
  return '<div class="tl-head"><span class="tl-lbl">Contrato — '+(im.prazo_contrato_dias||120)+' dias</span><span class="tl-rest" style="color:'+restColor+'">'+restLabel+'</span></div><div class="tl-row"><div class="tl-rlbl">Prazo</div><div class="tl-track"><div class="tl-fill" style="width:100%;background:var(--navy);opacity:0.15"></div><div class="tl-marker" style="left:'+hPct+'%"><div class="tl-hoje">HOJE</div></div></div></div><div class="tl-row"><div class="tl-rlbl">Progresso</div><div class="tl-track"><div class="tl-fill" style="width:'+hPct+'%;background:'+barColor+'"></div></div></div>';
}

function marcosHtml(im){
  var metaInterna=calcMetaInterna(im);var hoje=new Date();hoje.setHours(0,0,0,0);var nos=[];
  if(im.prazo_repaginacao_dias!=null)nos.push({abrev:'Repag.',data:im.data_repaginacao_concluida,st:im.status_repaginacao||'pendente'});
  nos.push({abrev:'Grav.',data:im.data_gravacao_conteudo,st:im.data_gravacao_conteudo?'ok':'pendente'});
  nos.push({abrev:'Camp.',data:im.data_midia_entregue,st:im.data_midia_entregue?'ok':'pendente'});
  nos.push({abrev:'Meta',data:metaInterna,st:!metaInterna?'pendente':hoje<=new Date(metaInterna+'T00:00:00')?'ok':'atrasado'});
  nos.push({abrev:'Fim',data:im.data_fim,st:!im.data_fim?'pendente':hoje<=new Date(im.data_fim+'T00:00:00')?'ok':'atrasado'});
  var html='<div class="tl-horiz"><div class="tl-horiz-inner">';
  for(var i=0;i<nos.length;i++){var n=nos[i];if(i>0){var prev=nos[i-1];var dias=diffDias(prev.data,n.data);var lineOk=prev.st==='ok'&&n.st==='ok';html+='<div class="tl-connector"><div class="tl-line'+(lineOk?' ok':'')+'"></div><div class="tl-interval">'+(dias!=null?dias+'d':'')+'</div></div>';}html+='<div class="tl-node"><div class="tl-node-dot '+n.st+'"></div><div class="tl-node-lbl">'+n.abrev+'</div><div class="tl-node-data">'+(n.data?fmtDShort(n.data):'-')+'</div></div>';}
  html+='</div></div>';return html;
}

function funilHtml(im){
  var rows=[{lbl:'Leads',a:im.total_leads||0,m:im.meta_leads||1},{lbl:'Visitas',a:im.total_visitas||0,m:im.meta_visitas||1},{lbl:'Propostas',a:im.total_propostas||0,m:im.meta_propostas||1}];
  var html='';
  for(var i=0;i<rows.length;i++){var r=rows[i];var p=pct(r.a,r.m);var col=p>=90?'var(--green)':p>=60?'var(--yellow)':'var(--red)';html+='<div class="funil-row"><div class="funil-lbl">'+r.lbl+'</div><div class="funil-bar"><div class="bar-bg"><div class="bar-fill" style="width:'+p+'%;background:'+col+'"></div></div></div><div class="funil-nums">'+r.a+'<span class="funil-target"> / '+r.m+'</span></div><div class="dot" style="background:'+col+'"></div></div>';}
  return html;
}

function midiaHtml(im){
  var gasto=im.gastos_metaads?'R$ '+parseFloat(im.gastos_metaads).toLocaleString('pt-BR'):'-';
  var alcance=im.alcance_metaads?parseInt(im.alcance_metaads).toLocaleString('pt-BR'):'-';
  var freq=im.frequencia_metaads?parseFloat(im.frequencia_metaads).toFixed(2).replace('.',','):'-';
  return '<div class="mbox-row"><div class="mbox"><div class="mbox-lbl">Investido</div><div class="mbox-val">'+gasto+'</div></div><div class="mbox"><div class="mbox-lbl">Alcance</div><div class="mbox-val">'+alcance+'</div></div><div class="mbox"><div class="mbox-lbl">Frequência</div><div class="mbox-val">'+freq+'</div></div></div>';
}

function visitasHtml(vis){
  if(!vis.length)return '<div class="vis-empty">Nenhuma visita registrada até o momento.</div>';
  var html='';
  for(var i=0;i<vis.length;i++){var v=vis[i];var stB=v.status_pos_visita==='proposta_gerada'?'proposta_gerada':'sem_proposta';var stL=v.status_pos_visita==='proposta_gerada'?'Proposta gerada':'Sem proposta';html+='<div class="vis-item"><div class="vis-top"><div class="vis-left"><div class="vis-av" style="background:'+avatarCor(v.nome_interessado)+'">'+inicial(v.nome_interessado)+'</div><div><div class="vis-name">'+(v.nome_interessado||'-')+'</div><div class="vis-date">'+(v.data_visita?fmtD(v.data_visita):'-')+'</div></div></div><div class="vis-badge '+stB+'">'+stL+'</div></div>'+(v.observacoes?'<div class="vis-obs">'+v.observacoes+'</div>':'')+'</div>';}
  return html;
}

function renderPage(im,vis){
  var nome=im.nome||(im.proprietario?'Exclusividade '+im.proprietario:'Imóvel');
  var props=[];
  if(im.tipo_imovel)props.push('<span class="pill pill-navy">'+im.tipo_imovel+'</span>');
  if(im.localizacao)props.push('<span class="pill pill-muted">'+im.localizacao+'</span>');
  props.push('<span class="pill pill-gold">Exclusividade</span>');
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var dataFimD=im.data_fim?new Date(im.data_fim+'T00:00:00'):null;
  var diasRest=dataFimD?Math.round((dataFimD-hoje)/86400000):null;
  var metaInt=calcMetaInterna(im);
  var infoBoxes='';
  infoBoxes+='<div style="background:var(--bg);border-radius:10px;padding:10px 12px"><div style="font-size:8.5px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Início</div><div style="font-size:13px;font-weight:800">'+fmtD(im.data_inicio)+'</div></div>';
  infoBoxes+='<div style="background:var(--bg);border-radius:10px;padding:10px 12px"><div style="font-size:8.5px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Fim Contrato</div><div style="font-size:13px;font-weight:800'+(diasRest!==null&&diasRest<=15?';color:var(--red)':'')+'">'+fmtD(im.data_fim)+'</div></div>';
  if(metaInt)infoBoxes+='<div style="background:var(--bg);border-radius:10px;padding:10px 12px"><div style="font-size:8.5px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Meta Interna</div><div style="font-size:13px;font-weight:800">'+fmtD(metaInt)+'</div></div>';
  if(diasRest!==null){var dColor=diasRest<=15?'var(--red)':diasRest<=30?'var(--yellow)':'var(--green)';infoBoxes+='<div style="background:var(--bg);border-radius:10px;padding:10px 12px"><div style="font-size:8.5px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Dias Restantes</div><div style="font-size:13px;font-weight:800;color:'+dColor+'">'+diasRest+'d</div></div>';}
  var atualizado=im.atualizado_em?new Date(im.atualizado_em).toLocaleString('pt-BR'):null;
  var html='';
  html+='<div class="card-hero fade-in"><div style="position:relative;z-index:1"><div style="font-size:20px;color:#fff;font-weight:900;line-height:1.25">'+nome.toUpperCase()+'</div>';
  if(im.proprietario)html+='<div style="color:rgba(255,255,255,0.45);font-size:11px;margin-top:4px">'+im.proprietario+'</div>';
  html+='<div style="font-size:26px;color:#fff;font-weight:900;margin-top:12px;letter-spacing:-0.5px">'+(im.preco||'-')+'</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px">'+props.join('')+'</div></div></div>';
  if(atualizado)html+='<div class="updated-at fade-in fade-in-d1">Última atualização: '+atualizado+'</div>';
  html+='<div class="scard fade-in fade-in-d1"><div class="scard-title">Timeline do Contrato</div>'+tlHtml(im)+'<div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px">'+infoBoxes+'</div></div>';
  html+='<div class="scard fade-in fade-in-d2"><div class="scard-title">Linha do Tempo Operacional</div>'+marcosHtml(im)+'</div>';
  html+='<div class="scard fade-in fade-in-d3"><div class="scard-title">Funil de Vendas</div>'+funilHtml(im)+'</div>';
  var temMidia=(im.gastos_metaads&&parseFloat(im.gastos_metaads)>0)||(im.alcance_metaads&&parseInt(im.alcance_metaads)>0);
  if(temMidia)html+='<div class="scard fade-in fade-in-d4"><div class="scard-title">Campanha de Mídia</div>'+midiaHtml(im)+'</div>';
  html+='<div class="scard fade-in fade-in-d5"><div class="scard-title">Relatório de Visitas ('+(vis.length)+')</div>'+visitasHtml(vis)+'</div>';
  html+='<div class="footer fade-in fade-in-d6"><div class="footer-brand">Gabriel Certeiro</div><div class="footer-sub">CRECI 22.249/SC · Itajaí/SC</div><a class="footer-link" href="https://gabrielcerteiro.com.br" target="_blank">gabrielcerteiro.com.br</a></div>';
  document.getElementById('main').innerHTML=html;
}

function copyLink(){
  var url=window.location.href.replace(/[&?]from=internal/,'');
  navigator.clipboard.writeText(url).then(function(){
    var t=document.getElementById('copyToast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);
  }).catch(function(){
    var tmp=document.createElement('input');document.body.appendChild(tmp);tmp.value=url;tmp.select();document.execCommand('copy');document.body.removeChild(tmp);
    var t=document.getElementById('copyToast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);
  });
}

(function(){var p=new URLSearchParams(window.location.search);if(!p.get('from')){var b=document.getElementById('copyBar');if(b)b.style.display='none';}})();

async function load(){
  var params=new URLSearchParams(window.location.search);
  var id=params.get('id');
  if(!id){document.getElementById('main').innerHTML='<div class="erro-box"><p>Nenhum imóvel selecionado.</p></div>';return;}
  try{
    var res=await sb.from('dashboard_imoveis').select('*').eq('id',id).single();
    if(res.error)throw res.error;
    var im=res.data;
    if(!im){document.getElementById('main').innerHTML='<div class="erro-box"><p>Imóvel não encontrado.</p></div>';return;}
    document.title=(im.nome||'Imóvel')+' — Relatório de Vendas · Gabriel Certeiro';
    var vis=[];
    if(im.imovel_id){var vr=await sb.from('dashboard_visitas_detalhe').select('*').eq('imovel_id',im.imovel_id).order('data_visita',{ascending:false});vis=vr.data||[];}
    renderPage(im,vis);
  }catch(err){document.getElementById('main').innerHTML='<div class="erro-box"><p>Erro ao carregar: '+err.message+'</p></div>';}
}
load();
</script>
