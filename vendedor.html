<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Acompanhamento de Venda &mdash; Gabriel Certeiro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#191949;--white:#FFFFFF;--bg:#F7F7FA;--text:#191949;--muted:#8E8EA0;--s2:#ECECF1;--s3:#D9D9E3;--green:#10B981;--green-bg:rgba(16,185,129,0.08);--green-l:#D1FAE5;--red:#EF4444;--red-bg:rgba(239,68,68,0.08);--red-l:#FEE2E2;--yellow:#F59E0B;--yellow-bg:rgba(245,158,11,0.08);--yellow-l:#FEF3C7;--blue:#3B82F6;--blue-bg:rgba(59,130,246,0.08);--blue-l:#DBEAFE;--gold:#B8922A;--gold-bg:rgba(184,146,42,0.06);--card-shadow:0 1px 3px rgba(25,25,73,0.06),0 1px 2px rgba(25,25,73,0.04);--card-radius:14px}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.hdr{background:var(--white);border-bottom:1px solid var(--s2);padding:14px 20px 12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(25,25,73,0.04)}
.hdr-left .brand{font-size:13px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--navy)}
.hdr-left .sub{font-size:8px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.hdr-badge{font-size:8.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:4px 10px;border-radius:20px;background:var(--gold-bg);color:var(--gold);border:1px solid rgba(184,146,42,0.18)}
.copy-fab{position:fixed;bottom:24px;right:16px;background:var(--navy);color:#fff;border:none;border-radius:20px;padding:10px 16px;font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;display:none;align-items:center;gap:6px;box-shadow:0 4px 16px rgba(25,25,73,0.22);z-index:200;transition:opacity .15s}
.copy-fab:active{opacity:0.8}
.copy-fab.visible{display:inline-flex}
.copy-toast{position:fixed;bottom:72px;right:16px;font-size:11px;font-weight:700;color:var(--white);background:var(--green);padding:6px 14px;border-radius:10px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:201}
.copy-toast.show{opacity:1}
.page{padding:16px 16px 40px;max-width:480px;margin:0 auto}
.hero-card{background:var(--navy);border-radius:var(--card-radius);padding:22px 20px;margin-bottom:12px;position:relative;overflow:hidden}
.hero-card::after{content:'';position:absolute;top:-25%;right:-8%;width:200px;height:200px;background:radial-gradient(circle,rgba(184,146,42,0.10) 0%,transparent 65%);border-radius:50%;pointer-events:none}
.hero-nome{font-size:22px;font-weight:900;color:#fff;line-height:1.2;position:relative;z-index:1}
.hero-row2{display:flex;justify-content:space-between;align-items:baseline;margin-top:6px;position:relative;z-index:1}
.hero-prop{font-size:11px;font-weight:500;color:rgba(255,255,255,0.4)}
.hero-preco{font-size:14px;font-weight:700;color:rgba(255,255,255,0.55)}
.updated-at{text-align:center;font-size:10px;color:var(--muted);margin-bottom:14px}
.scard{background:var(--white);border-radius:var(--card-radius);padding:16px 18px;margin-bottom:12px;box-shadow:var(--card-shadow);border:1px solid var(--s2)}
.scard-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.prazo-boxes{display:flex;gap:8px;margin-bottom:14px}
.prazo-box{flex:1;background:var(--bg);border-radius:10px;padding:10px 8px;text-align:center}
.prazo-box-lbl{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:4px}
.prazo-box-num{font-size:20px;font-weight:800;color:var(--navy);line-height:1}
.prazo-box-unit{font-size:11px;font-weight:500;color:var(--muted);margin-left:2px}
.prazo-prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prazo-prog-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.prazo-rest{font-size:11px;font-weight:700}
.prazo-bar-wrap{height:7px;background:var(--s2);border-radius:4px;overflow:hidden;margin-bottom:6px}
.prazo-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.prazo-dates{display:flex;justify-content:space-between}
.prazo-date-lbl{font-size:9px;color:var(--muted);font-weight:500}
.ativ-boxes{display:flex;gap:8px}
.ativ-box{flex:1;background:var(--bg);border-radius:10px;padding:12px 8px;text-align:center}
.ativ-box-lbl{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:6px}
.ativ-box-num{font-size:28px;font-weight:900;line-height:1}
.midia-boxes{display:flex;gap:8px}
.midia-box{flex:1;background:var(--bg);border-radius:10px;padding:10px 8px;text-align:center}
.midia-box-lbl{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:4px}
.midia-box-val{font-size:15px;font-weight:800;color:var(--navy)}
.neg-summary{display:flex;gap:8px;margin-bottom:14px}
.neg-sum-box{flex:1;border-radius:10px;padding:12px 10px;text-align:center}
.neg-sum-box.andamento{background:var(--yellow-bg);border:1px solid rgba(245,158,11,0.15)}
.neg-sum-box.nao-avancou{background:var(--red-bg);border:1px solid rgba(239,68,68,0.1)}
.neg-sum-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:4px}
.neg-sum-num{font-size:26px;font-weight:900;line-height:1}
.neg-sum-box.andamento .neg-sum-num{color:var(--yellow)}
.neg-sum-box.nao-avancou .neg-sum-num{color:var(--red)}
.neg-toggle{display:flex;gap:6px;margin-bottom:12px}
.neg-toggle-btn{flex:1;padding:7px 0;font-size:11px;font-weight:700;border-radius:8px;border:1.5px solid var(--s2);background:var(--white);color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.neg-toggle-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.neg-item{padding:11px 0;border-bottom:1px solid var(--s2)}
.neg-item:first-child{padding-top:0}
.neg-item:last-child{border-bottom:none;padding-bottom:0}
.neg-item-top{display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
.neg-item-left{display:flex;align-items:center;gap:9px}
.neg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.neg-nome{font-size:12px;font-weight:700;color:var(--text)}
.neg-data{font-size:10px;color:var(--muted);margin-top:1px}
.neg-badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px}
.neg-badge.em_andamento{background:var(--yellow-l);color:#92400e}
.neg-badge.aceita{background:var(--green-l);color:#065f46}
.neg-badge.recusada{background:var(--red-l);color:#991b1b}
.neg-badge.desistiu{background:var(--s2);color:var(--muted)}
.neg-detail{margin-top:8px;padding-top:8px;border-top:1px solid var(--s2);display:none}
.neg-detail.open{display:block}
.neg-detail-row{display:flex;align-items:baseline;gap:6px;margin-bottom:5px}
.neg-detail-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);flex-shrink:0}
.neg-detail-val{font-size:11px;font-weight:600;color:var(--text)}
.neg-valor{font-size:14px;font-weight:800;color:var(--navy)}
.neg-obs{font-size:10px;color:#3a4550;background:var(--bg);border-radius:6px;padding:7px 10px;line-height:1.5;margin-top:6px}
.neg-hint{font-size:9px;color:var(--muted);text-align:right;margin-top:4px}
.neg-empty{font-size:12px;color:var(--muted);text-align:center;padding:12px 0}
.int-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.int-bar-lbl{width:110px;font-size:9px;font-weight:700;color:var(--text);flex-shrink:0;line-height:1.3}
.int-bar-wrap{flex:1;height:6px;border-radius:3px;overflow:hidden}
.int-bar-fill{height:100%;border-radius:3px}
.int-bar-pct{font-size:10px;font-weight:800;flex-shrink:0;width:30px;text-align:right}
.int-bar-cnt{font-size:9px;color:var(--muted);flex-shrink:0}
.vis-item{padding:12px 0;border-bottom:1px solid var(--s2)}
.vis-item:first-child{padding-top:0}
.vis-item:last-child{border-bottom:none;padding-bottom:0}
.vis-item-top{display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
.vis-left{display:flex;align-items:center;gap:8px}
.vis-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.vis-nome{font-size:12px;font-weight:700}
.vis-data{font-size:10px;color:var(--muted);margin-top:1px}
.vis-badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px}
.vis-badge.quer_comprar{background:var(--green-l);color:#065f46}
.vis-badge.esta_pensando{background:var(--yellow-l);color:#92400e}
.vis-badge.nao_gostou{background:var(--red-l);color:#991b1b}
.vis-badge.segunda_visita{background:var(--blue-l);color:#1e40af}
.vis-detail{margin-top:8px;display:none}
.vis-detail.open{display:block}
.vis-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.vis-tag{font-size:9px;padding:2px 7px;border-radius:8px;background:var(--red-bg);color:var(--red);font-weight:600}
.vis-obs{font-size:10px;color:#3a4550;background:var(--bg);border-radius:6px;padding:6px 8px;line-height:1.5}
.vis-hint{font-size:9px;color:var(--muted);text-align:right;margin-top:4px}
.vis-empty{font-size:12px;color:var(--muted);text-align:center;padding:8px 0}
.footer{margin-top:24px;padding:40px 20px 36px;text-align:center;border-top:1px solid var(--s2);background:var(--white)}
.footer-logo{display:block;margin:0 auto;width:100%;max-width:280px;height:auto}
.footer-divider{width:32px;height:1px;background:var(--s3);margin:20px auto}
.footer-links{display:flex;justify-content:center;align-items:center;gap:6px;flex-wrap:wrap}
.footer-sep{color:var(--s3);font-size:12px}
.footer-link{font-size:11px;color:var(--muted);font-weight:600;text-decoration:none;letter-spacing:0.3px}
.footer-link:hover{color:var(--navy)}
@media(min-width:900px){
  .page{max-width:940px;padding:28px 40px 60px}
  .vend-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  .vend-full{grid-column:1/-1}
  .vend-grid .scard{margin-bottom:0}
}
.loading{text-align:center;padding:60px 20px}
.loading-spin{width:28px;height:28px;border:3px solid var(--s2);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:var(--muted)}
.erro-box{background:var(--red-bg);border-radius:12px;padding:24px;margin:30px 0;text-align:center}
.erro-box p{font-size:13px;color:var(--red);font-weight:600}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .4s ease both}
.fd1{animation-delay:.04s}.fd2{animation-delay:.08s}.fd3{animation-delay:.12s}.fd4{animation-delay:.16s}.fd5{animation-delay:.20s}.fd6{animation-delay:.24s}.fd7{animation-delay:.28s}.fd8{animation-delay:.32s}.fd9{animation-delay:.36s}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    <div class="brand">Gabriel Certeiro</div>
    <div class="sub">3 e 4 Suites &middot; Fazenda e Brava</div>
  </div>
  <div class="hdr-badge">Acompanhamento</div>
</div>
<button class="copy-fab" id="copyBar" onclick="copyLink()">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
  Copiar link
</button>
<div class="copy-toast" id="copyToast">Link copiado!</div>
<div class="page" id="main">
  <div class="loading"><div class="loading-spin"></div><div class="loading-txt">Carregando...</div></div>
</div>
<script>
var SUPA_URL='https://vtykzralkxlbqqkleofl.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0eWt6cmFsa3hsYnFxa2xlb2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjMyNjAsImV4cCI6MjA4OTkzOTI2MH0.rYBifw2NXqVDGrKbDWKJgrFAIdoruxxsIPc9RXibgy0';
var sb=supabase.createClient(SUPA_URL,SUPA_KEY);
var negFiltro='andamento';

function fmtD(s){if(!s)return'-';var d=new Date(s+'T00:00:00');return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function fmtV(v){if(!v&&v!==0)return'-';return 'R$ '+parseFloat(v).toLocaleString('pt-BR');}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function avatarCor(n){var c=['#10B981','#3B82F6','#8B5CF6','#F59E0B','#191949','#06B6D4'],h=0;for(var i=0;i<(n||'?').length;i++)h=(n||'?').charCodeAt(i)+((h<<5)-h);return c[Math.abs(h)%c.length];}
function inicial(n){return(n||'?').charAt(0).toUpperCase();}

var PAGTO_LABEL={'a_vista':'A vista','financiamento':'Financiamento','parcelamento_direto':'Parcelamento direto','dacao_a_vista':'Dacao + a vista','dacao_financiamento':'Dacao + financiamento','dacao_parcelamento_direto':'Dacao + parcelamento','parcelamento_direto_financiamento':'Parcelamento + financiamento'};
var STATUS_LABEL={'em_andamento':'Em andamento','aceita':'Aceita','recusada':'Recusada','desistiu':'Desistiu'};

function prazoHtml(im){
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var dataInicio=im.data_inicio?new Date(im.data_inicio+'T00:00:00'):null;
  var dataFim=im.data_fim?new Date(im.data_fim+'T00:00:00'):null;
  var diasContrato=im.prazo_contrato_dias||120;
  var diasRep=im.prazo_repaginacao_dias?parseInt(im.prazo_repaginacao_dias):0;
  var diasVenda=diasContrato-diasRep;
  var diasRest=dataFim?Math.round((dataFim-hoje)/86400000):null;
  var restColor=diasRest===null?'var(--muted)':diasRest>60?'#10B981':diasRest>30?'#F59E0B':'#EF4444';
  var progPct=0;
  if(dataInicio&&dataFim){var total=Math.max(Math.round((dataFim-dataInicio)/86400000),1);var passados=Math.max(0,Math.min(Math.round((hoje-dataInicio)/86400000),total));progPct=Math.round((passados/total)*100);}
  var boxesHtml='';
  if(diasRep>0){boxesHtml+='<div class="prazo-box"><div class="prazo-box-lbl">Repaginacao</div><div class="prazo-box-num">'+diasRep+'<span class="prazo-box-unit">dias</span></div></div>';}
  boxesHtml+='<div class="prazo-box"><div class="prazo-box-lbl">Venda</div><div class="prazo-box-num">'+diasVenda+'<span class="prazo-box-unit">dias</span></div></div>';
  boxesHtml+='<div class="prazo-box"><div class="prazo-box-lbl">Total</div><div class="prazo-box-num">'+diasContrato+'<span class="prazo-box-unit">dias</span></div></div>';
  var restLabel=diasRest===null?'-':diasRest>=0?diasRest+' dias restantes':Math.abs(diasRest)+' dias alem do prazo';
  return '<div class="prazo-boxes">'+boxesHtml+'</div><div class="prazo-prog-row"><span class="prazo-prog-lbl">Progresso</span><span class="prazo-rest" style="color:'+restColor+'">'+restLabel+'</span></div><div class="prazo-bar-wrap"><div class="prazo-bar-fill" style="width:'+progPct+'%;background:'+restColor+'"></div></div><div class="prazo-dates"><span class="prazo-date-lbl">'+fmtD(im.data_inicio)+'</span><span class="prazo-date-lbl">'+fmtD(im.data_fim)+'</span></div>';
}

function atividadeHtml(im){
  return '<div class="ativ-boxes"><div class="ativ-box"><div class="ativ-box-lbl">Interessados</div><div class="ativ-box-num" style="color:var(--navy)">'+(im.total_leads||0)+'</div></div><div class="ativ-box"><div class="ativ-box-lbl">Visitas</div><div class="ativ-box-num" style="color:var(--blue)">'+(im.total_visitas||0)+'</div></div><div class="ativ-box"><div class="ativ-box-lbl">Propostas</div><div class="ativ-box-num" style="color:var(--green)">'+(im.total_propostas||0)+'</div></div></div>';
}

function midiaHtml(im){
  var gasto=im.gastos_metaads?'R$ '+parseFloat(im.gastos_metaads).toLocaleString('pt-BR'):'-';
  var alcance=im.alcance_metaads?parseInt(im.alcance_metaads).toLocaleString('pt-BR'):'-';
  var freq=im.frequencia_metaads?parseFloat(im.frequencia_metaads).toFixed(2).replace('.',','):'-';
  return '<div class="midia-boxes"><div class="midia-box"><div class="midia-box-lbl">Investido</div><div class="midia-box-val">'+gasto+'</div></div><div class="midia-box"><div class="midia-box-lbl">Alcance</div><div class="midia-box-val">'+alcance+'</div></div><div class="midia-box"><div class="midia-box-lbl">Frequencia</div><div class="midia-box-val">'+freq+'</div></div></div>';
}

function negListaHtml(negs,filtro){
  var lista=filtro==='andamento'?negs.filter(function(n){return n.status==='em_andamento';}):negs;
  if(!lista.length)return '<div class="neg-empty">Nenhuma proposta '+(filtro==='andamento'?'ativa':'registrada.')+'</div>';
  var html='';
  for(var i=0;i<lista.length;i++){
    var n=lista[i];
    var cor=avatarCor(n.nome_interessado);
    var ini=inicial(n.nome_interessado);
    var statusCls=n.status||'em_andamento';
    var statusLbl=STATUS_LABEL[n.status]||n.status;
    var pagtoLbl=PAGTO_LABEL[n.forma_pagamento]||n.forma_pagamento||'-';
    html+='<div class="neg-item"><div class="neg-item-top" onclick="toggleNeg(\'neg_'+i+'\')"><div class="neg-item-left"><div class="neg-av" style="background:'+cor+'">'+ini+'</div><div><div class="neg-nome">'+(n.nome_interessado||'-')+'</div><div class="neg-data">'+fmtD(n.data)+'</div></div></div><span class="neg-badge '+statusCls+'">'+statusLbl+'</span></div><div class="neg-hint">Toque para ver detalhes</div><div class="neg-detail" id="neg_'+i+'"><div class="neg-detail-row"><span class="neg-detail-lbl">Valor</span><span class="neg-valor">'+fmtV(n.valor_proposto)+'</span></div><div class="neg-detail-row"><span class="neg-detail-lbl">Pagamento</span><span class="neg-detail-val">'+pagtoLbl+'</span></div>'+(n.observacao?'<div class="neg-obs">'+escHtml(n.observacao)+'</div>':'')+'</div></div>';
  }
  return html;
}

function negHtml(negs){
  var nAtivos=negs.filter(function(n){return n.status==='em_andamento';}).length;
  var nNaoAvanc=negs.filter(function(n){return n.status==='recusada'||n.status==='desistiu';}).length;
  return '<div class="neg-summary"><div class="neg-sum-box andamento"><div class="neg-sum-lbl">Em andamento</div><div class="neg-sum-num">'+nAtivos+'</div></div><div class="neg-sum-box nao-avancou"><div class="neg-sum-lbl">Nao avancaram</div><div class="neg-sum-num">'+nNaoAvanc+'</div></div></div><div class="neg-toggle"><button class="neg-toggle-btn '+(negFiltro==='andamento'?'active':'')+'" onclick="setFiltro(\'andamento\')">Em andamento</button><button class="neg-toggle-btn '+(negFiltro==='todas'?'active':'')+'" onclick="setFiltro(\'todas\')">Todas</button></div><div id="negLista">'+negListaHtml(negs,negFiltro)+'</div>';
}

function intencaoHtml(vis){
  if(!vis.length)return '<div class="vis-empty">Sem dados de visita.</div>';
  var cats=[{key:'Quer comprar',cor:'#10B981',bg:'rgba(16,185,129,0.75)'},{key:'Esta pensando',cor:'#F59E0B',bg:'rgba(245,158,11,0.75)'},{key:'Quer segunda visita',cor:'#3B82F6',bg:'rgba(59,130,246,0.75)'},{key:'Nao gostou',cor:'#EF4444',bg:'rgba(239,68,68,0.75)'}];
  var counts={};
  for(var c=0;c<cats.length;c++)counts[cats[c].key]=0;
  for(var j=0;j<vis.length;j++){var it=vis[j].intencao;if(it&&counts[it]!==undefined)counts[it]++;}
  var total=vis.length;
  var html='<div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px">Intencao pos-visita ('+total+' visitas)</div>';
  for(var i=0;i<cats.length;i++){
    var cat=cats[i],count=counts[cat.key]||0,pctV=total>0?Math.round((count/total)*100):0;
    html+='<div class="int-bar-row"><div class="int-bar-lbl">'+cat.key+'</div><div class="int-bar-wrap" style="background:#ECECF1"><div class="int-bar-fill" style="width:'+pctV+'%;background:'+cat.bg+'"></div></div><div class="int-bar-pct" style="color:'+cat.cor+'">'+pctV+'%</div><div class="int-bar-cnt">('+count+')</div></div>';
  }
  return html;
}

function objecoesHtml(vis){
  var freq={};
  for(var i=0;i<vis.length;i++){var obs=vis[i].objections;if(Array.isArray(obs)){for(var j=0;j<obs.length;j++){var o=obs[j];if(o)freq[o]=(freq[o]||0)+1;}}}
  var keys=Object.keys(freq).sort(function(a,b){return freq[b]-freq[a];});
  if(!keys.length)return null;
  var maxV=freq[keys[0]]||1,html='';
  for(var k=0;k<keys.length;k++){var key=keys[k],cnt=freq[key],pctV=Math.round((cnt/maxV)*100);html+='<div class="int-bar-row"><div class="int-bar-lbl">'+key+'</div><div class="int-bar-wrap" style="background:#ECECF1"><div class="int-bar-fill" style="width:'+pctV+'%;background:rgba(239,68,68,0.75)"></div></div><div class="int-bar-pct" style="color:#EF4444">'+cnt+'x</div></div>';}
  return html;
}

var INTENT_CLS={'Quer comprar':'quer_comprar','Esta pensando':'esta_pensando','Nao gostou':'nao_gostou','Quer segunda visita':'segunda_visita'};
var INTENT_LBL={'Quer comprar':'Quer comprar','Esta pensando':'Esta pensando','Nao gostou':'Nao gostou','Quer segunda visita':'Segunda visita'};

function visitasHtml(vis){
  if(!vis.length)return '<div class="vis-empty">Nenhuma visita registrada.</div>';
  var html='';
  for(var i=0;i<vis.length;i++){
    var v=vis[i];
    var cor=avatarCor(v.nome_interessado),ini=inicial(v.nome_interessado);
    var intCls=INTENT_CLS[v.intencao]||'esta_pensando';
    var intLbl=INTENT_LBL[v.intencao]||(v.intencao||'-');
    var obs=Array.isArray(v.objections)&&v.objections.length?v.objections:[];
    html+='<div class="vis-item"><div class="vis-item-top" onclick="toggleVis(\'vis_'+i+'\')"><div class="vis-left"><div class="vis-av" style="background:'+cor+'">'+ini+'</div><div><div class="vis-nome">'+(v.nome_interessado||'-')+'</div><div class="vis-data">'+fmtD(v.data_visita)+'</div></div></div><span class="vis-badge '+intCls+'">'+intLbl+'</span></div><div class="vis-hint">Toque para ver detalhes</div><div class="vis-detail" id="vis_'+i+'">'+(obs.length?'<div class="vis-tags">'+obs.map(function(t){return '<span class="vis-tag">'+t+'</span>';}).join('')+'</div>':'')+(v.observacoes?'<div class="vis-obs">'+escHtml(v.observacoes)+'</div>':'')+'</div></div>';
  }
  return html;
}

var _negs=[];

function setFiltro(f){
  negFiltro=f;
  document.querySelectorAll('.neg-toggle-btn').forEach(function(b){b.classList.toggle('active',b.textContent.trim()===(f==='andamento'?'Em andamento':'Todas'));});
  var el=document.getElementById('negLista');
  if(el)el.innerHTML=negListaHtml(_negs,f);
}

function toggleNeg(id){var el=document.getElementById(id);if(el)el.classList.toggle('open');}
function toggleVis(id){var el=document.getElementById(id);if(el)el.classList.toggle('open');}

function copyLink(){
  var url=window.location.href.replace(/[&?]from=internal/g,'').replace(/&&/g,'&').replace(/\?&/,'?');
  navigator.clipboard.writeText(url).then(function(){var t=document.getElementById('copyToast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}).catch(function(){var tmp=document.createElement('input');document.body.appendChild(tmp);tmp.value=url;tmp.select();document.execCommand('copy');document.body.removeChild(tmp);var t=document.getElementById('copyToast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);});
}

function renderPage(im,vis,negs){
  _negs=negs;
  var nome=im.nome||'Imovel';
  var atualizado=im.atualizado_em?new Date(im.atualizado_em).toLocaleString('pt-BR'):null;
  var temMidia=(im.gastos_metaads&&parseFloat(im.gastos_metaads)>0)||(im.alcance_metaads&&parseInt(im.alcance_metaads)>0);
  var obsHtml=objecoesHtml(vis);
  var html='';
  html+='<div class="hero-card fade-in"><div class="hero-nome">'+nome.toUpperCase()+'</div><div class="hero-row2"><span class="hero-prop">'+(im.proprietario||'')+'</span><span class="hero-preco">'+(im.preco||'')+'</span></div></div>';
  if(atualizado)html+='<div class="updated-at fade-in fd1">Ultima atualizacao: '+atualizado+'</div>';
  html+='<div class="vend-grid">';
  html+='<div class="scard fade-in fd2"><div class="scard-title">Prazo da Exclusividade</div>'+prazoHtml(im)+'</div>';
  html+='<div class="scard fade-in fd3"><div class="scard-title">Atividade Comercial</div>'+atividadeHtml(im)+'</div>';
  if(temMidia)html+='<div class="scard fade-in fd4"><div class="scard-title">Investimento em Midia</div>'+midiaHtml(im)+'</div>';
  html+='<div class="scard vend-full fade-in fd5"><div class="scard-title">Propostas ('+negs.length+')</div>'+negHtml(negs)+'</div>';
  html+='<div class="scard fade-in fd6">'+intencaoHtml(vis)+'</div>';
  if(obsHtml)html+='<div class="scard fade-in fd7"><div class="scard-title">Principais Objecoes</div>'+obsHtml+'</div>';
  html+='<div class="scard vend-full fade-in fd8"><div class="scard-title">Relatorio de Visitas ('+vis.length+')</div>'+visitasHtml(vis)+'</div>';
  html+='</div>';
  html+='<div class="footer fade-in fd9"><img src="https://vtykzralkxlbqqkleofl.supabase.co/storage/v1/object/public/Assets%20-%20Publicos/LOGO%20HEADLINE%20NOVA%202.PNG" alt="Gabriel Certeiro" class="footer-logo"><div class="footer-divider"></div><div class="footer-links"><a class="footer-link" href="https://gabrielcerteiro.com.br" target="_blank">gabrielcerteiro.com.br</a><span class="footer-sep">&middot;</span><a class="footer-link" href="https://instagram.com/gabrielcerteiro" target="_blank">@gabrielcerteiro</a><span class="footer-sep">&middot;</span><a class="footer-link" href="https://wa.me/5547996505050" target="_blank">WhatsApp</a></div></div>';
  document.getElementById('main').innerHTML=html;
  document.title=nome+' &mdash; Acompanhamento de Venda &middot; Gabriel Certeiro';
}

async function load(){
  var params=new URLSearchParams(window.location.search);
  var id=params.get('id');
  var fromInternal=params.get('from')==='internal';
  if(fromInternal){var bar=document.getElementById('copyBar');if(bar)bar.classList.add('visible');}
  if(!id){document.getElementById('main').innerHTML='<div class="erro-box"><p>Nenhum imovel selecionado.</p></div>';return;}
  try{
    var res=await sb.from('dashboard_imoveis').select('*').eq('id',id).single();
    if(res.error)throw res.error;
    var im=res.data;
    if(!im){document.getElementById('main').innerHTML='<div class="erro-box"><p>Imovel nao encontrado.</p></div>';return;}
    var vis=[];
    if(im.imovel_id){var vr=await sb.from('visitas').select('*').eq('imovel_id',im.imovel_id).order('data_visita',{ascending:false});vis=vr.data||[];}
    var negs=[];
    if(im.imovel_id){var nr=await sb.from('propostas').select('*').eq('imovel_id',im.imovel_id).order('data',{ascending:false});negs=nr.data||[];}
    renderPage(im,vis,negs);
  }catch(err){
    document.getElementById('main').innerHTML='<div class="erro-box"><p>Erro ao carregar: '+err.message+'</p></div>';
  }
}
load();
</script>
