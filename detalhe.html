<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Detalhe | Certeiro One</title>
<meta name="theme-color" content="#191949">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="nav.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#191949;--white:#FFFFFF;--bg:#F5F5F8;--text:#191949;--muted:#8E8EA0;--s2:#ECECF1;--s3:#D9D9E3;--green:#10B981;--green-bg:rgba(16,185,129,0.08);--green-l:#D1FAE5;--red:#EF4444;--red-bg:rgba(239,68,68,0.08);--red-l:#FEE2E2;--yellow:#F59E0B;--yellow-bg:rgba(245,158,11,0.08);--yellow-l:#FEF3C7;--blue:#3B82F6;--blue-bg:rgba(59,130,246,0.08);--blue-l:#DBEAFE;--gold:#B8922A;--gold-bg:rgba(184,146,42,0.06);--card-shadow:0 1px 3px rgba(25,25,73,0.06),0 1px 2px rgba(25,25,73,0.04);--card-radius:14px}
html,body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
/* AUTH */
.auth-overlay{position:fixed;inset:0;background:var(--navy);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:340px;text-align:center}
.auth-logo{font-size:13px;font-weight:900;letter-spacing:2.2px;text-transform:uppercase;color:var(--navy);margin-bottom:4px}
.auth-sub{font-size:9px;color:#8E8EA0;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:28px}
.auth-lbl{font-size:11px;font-weight:700;color:var(--navy);text-align:left;margin-bottom:4px;display:block}
.auth-input{width:100%;border:1.5px solid #ECECF1;border-radius:12px;padding:14px 16px;font-size:14px;font-family:'Nunito Sans',sans-serif;color:var(--navy);outline:none;text-align:left;margin-bottom:10px;-webkit-appearance:none;background:#fff}
.auth-input:focus{border-color:var(--navy)}
.auth-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;font-family:'Nunito Sans',sans-serif;cursor:pointer;margin-top:2px}
.auth-btn:disabled{opacity:0.6;cursor:not-allowed}
.auth-err{font-size:12px;color:#EF4444;font-weight:700;margin-top:10px;min-height:18px}
.auth-link{font-size:11px;color:#8E8EA0;cursor:pointer;margin-top:14px;display:block;font-weight:700}
.auth-link:hover{color:var(--navy)}
/* PAGE */
.app-wrap{display:block}
.page{padding:16px 16px 40px;max-width:480px;margin:0 auto}
/* HERO */
.hero-card{background:var(--navy);border-radius:var(--card-radius);padding:22px 20px;margin-bottom:12px;position:relative;overflow:hidden}
.hero-card::after{content:'';position:absolute;top:-25%;right:-8%;width:200px;height:200px;background:radial-gradient(circle,rgba(184,146,42,0.10) 0%,transparent 65%);border-radius:50%;pointer-events:none}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;position:relative;z-index:1}
.hero-nome{font-size:22px;font-weight:900;color:#fff;line-height:1.2;flex:1;min-width:0}
.btn-editar-hero{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.18);border-radius:10px;padding:7px 14px;font-size:11px;font-weight:700;font-family:'Nunito Sans',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s}
.btn-editar-hero:hover{background:rgba(255,255,255,0.2)}
.hero-row2{display:flex;justify-content:space-between;align-items:baseline;margin-top:6px;position:relative;z-index:1}
.hero-prop{font-size:11px;font-weight:500;color:rgba(255,255,255,0.4)}
.hero-preco{font-size:14px;font-weight:700;color:rgba(255,255,255,0.55)}
.updated-at{text-align:center;font-size:10px;color:var(--muted);margin-bottom:14px}
/* SCARD */
.scard{background:var(--white);border-radius:var(--card-radius);padding:16px 18px;margin-bottom:12px;box-shadow:var(--card-shadow);border:1px solid var(--s2)}
.scard-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
/* PRAZO */
.prazo-boxes{display:flex;gap:8px;margin-bottom:14px}
.prazo-box{flex:1;background:var(--bg);border-radius:10px;padding:10px 8px;text-align:center}
.prazo-box-lbl{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:4px}
.prazo-box-num{font-size:20px;font-weight:800;color:var(--navy);line-height:1}
.prazo-box-unit{font-size:11px;font-weight:500;color:var(--muted);margin-left:2px}
.prazo-prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prazo-prog-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.prazo-rest{font-size:11px;font-weight:700}
.prazo-bar-wrap{height:7px;background:var(--s2);border-radius:4px;overflow:hidden;margin-bottom:6px}
.prazo-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.prazo-dates{display:flex;justify-content:space-between}
.prazo-date-lbl{font-size:9px;color:var(--muted);font-weight:500}
/* FUNIL (meta vs realizado) */
.fun-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fun-bar-lbl{width:80px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0}
.fun-bar-wrap{flex:1;height:9px;background:var(--s2);border-radius:5px;position:relative;overflow:hidden}
.fun-bar-bg{position:absolute;top:0;left:0;height:100%;border-radius:5px}
.fun-bar-fill{position:absolute;top:0;left:0;height:100%;border-radius:5px;transition:width .4s ease}
.fun-bar-marker{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--navy);border-radius:1px;z-index:2}
.fun-bar-fill.s-green{background:var(--green)}
.fun-bar-fill.s-yellow{background:var(--yellow)}
.fun-bar-fill.s-red{background:var(--red)}
.fun-bar-bg.s-green{background:rgba(16,185,129,0.18)}
.fun-bar-bg.s-yellow{background:rgba(245,158,11,0.18)}
.fun-bar-bg.s-red{background:rgba(239,68,68,0.18)}
.fun-bar-nums{flex-shrink:0;text-align:right;min-width:92px;display:flex;align-items:baseline;gap:3px;justify-content:flex-end}
.fun-num-real{font-size:17px;font-weight:900;color:var(--navy);line-height:1}
.fun-num-real.behind{color:var(--red)}
.fun-num-exp{font-size:10px;font-weight:700;color:var(--muted)}
.fun-num-tot{font-size:9px;color:var(--s3);font-weight:600}
.fun-conv-wrap{margin-top:14px;padding-top:12px;border-top:1px solid var(--s2);display:flex;gap:10px}
.fun-conv-box{flex:1;background:var(--bg);border-radius:10px;padding:10px 8px;text-align:center}
.fun-conv-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);margin-bottom:5px}
.fun-conv-val{font-size:18px;font-weight:900;line-height:1}
.fun-conv-meta{font-size:9px;color:var(--muted);font-weight:600;margin-top:3px}
/* MIDIA EXTENDED */
.midia-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.midia-box{background:var(--bg);border-radius:10px;padding:12px 10px;text-align:center}
.midia-box-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:5px}
.midia-box-val{font-size:16px;font-weight:900;color:var(--navy);line-height:1}
.midia-box-val.over{color:var(--red)}
.midia-box-val.under{color:var(--green)}
.midia-box-meta{font-size:9px;color:var(--muted);font-weight:600;margin-top:4px}
.midia-box-meta.over{color:var(--red)}
.midia-box-meta.under{color:var(--green)}
/* CANAIS */
.canal-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:11px}
.canal-lbl{flex:0 0 180px;font-size:10px;font-weight:700;color:var(--text);line-height:1.3}
.canal-bar-wrap{flex:1;height:8px;background:var(--s2);border-radius:4px;overflow:hidden}
.canal-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.canal-bar-fill.c-ad{background:var(--red)}
.canal-bar-fill.c-off{background:var(--yellow)}
.canal-bar-fill.c-org{background:var(--green)}
.canal-n{flex-shrink:0;width:40px;text-align:right;font-size:13px;font-weight:800;color:var(--navy)}
.canal-empty{font-size:12px;color:var(--muted);text-align:center;padding:10px 0}
@media(max-width:560px){
  .canal-lbl{flex:0 0 140px;font-size:9px}
}
/* FONTE PROPOSTAS */
.fonte-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.fonte-box{background:var(--bg);border-radius:10px;padding:14px 12px;text-align:center}
.fonte-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);margin-bottom:6px}
.fonte-val{font-size:26px;font-weight:900;color:var(--navy);line-height:1}
.fonte-hint{font-size:9px;color:var(--muted);text-align:center;font-style:italic;margin-top:4px}
/* DISPAROS */
.disp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.disp-box{background:var(--bg);border-radius:10px;padding:14px 12px;text-align:center}
.disp-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:6px}
.disp-val{font-size:24px;font-weight:900;color:var(--navy);line-height:1}
.disp-date{font-size:10px;color:var(--muted);font-weight:600;margin-top:6px}
.disp-empty{font-size:10px;color:var(--muted);font-style:italic}
/* TIMELINE */
.tl-list{position:relative;padding-left:22px}
.tl-list::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--s2)}
.tl-item{position:relative;padding:6px 0;display:flex;align-items:baseline;gap:10px}
.tl-dot{position:absolute;left:-22px;top:10px;width:12px;height:12px;border-radius:50%;background:var(--navy);border:2px solid #fff;box-shadow:0 0 0 1px var(--s2)}
.tl-date{font-size:11px;font-weight:800;color:var(--navy);min-width:80px}
.tl-lbl{font-size:12px;color:var(--text);font-weight:600}
.tl-empty{font-size:12px;color:var(--muted);text-align:center;padding:10px 0}
/* PROPOSTAS (negocios) */
.neg-summary{display:flex;gap:8px;margin-bottom:14px}
.neg-sum-box{flex:1;border-radius:10px;padding:12px 10px;text-align:center}
.neg-sum-box.andamento{background:var(--yellow-bg);border:1px solid rgba(245,158,11,0.15)}
.neg-sum-box.nao-avancou{background:var(--red-bg);border:1px solid rgba(239,68,68,0.1)}
.neg-sum-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:4px}
.neg-sum-num{font-size:26px;font-weight:900;line-height:1}
.neg-sum-box.andamento .neg-sum-num{color:var(--yellow)}
.neg-sum-box.nao-avancou .neg-sum-num{color:var(--red)}
.neg-toggle{display:flex;gap:6px;margin-bottom:12px}
.neg-toggle-btn{flex:1;padding:7px 0;font-size:11px;font-weight:700;border-radius:8px;border:1.5px solid var(--s2);background:var(--white);color:var(--muted);cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:all .15s}
.neg-toggle-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.neg-item{padding:11px 0;border-bottom:1px solid var(--s2)}
.neg-item:first-child{padding-top:0}
.neg-item:last-child{border-bottom:none;padding-bottom:0}
.neg-item-top{display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
.neg-item-left{display:flex;align-items:center;gap:9px}
.neg-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.neg-nome{font-size:12px;font-weight:700;color:var(--text)}
.neg-data{font-size:10px;color:var(--muted);margin-top:1px}
.neg-badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px}
.neg-badge.em_andamento{background:var(--yellow-l);color:#92400e}
.neg-badge.aceita{background:var(--green-l);color:#065f46}
.neg-badge.recusada{background:var(--red-l);color:#991b1b}
.neg-badge.desistiu{background:var(--s2);color:var(--muted)}
.neg-detail{margin-top:8px;padding-top:8px;border-top:1px solid var(--s2);display:none}
.neg-detail.open{display:block}
.neg-detail-row{display:flex;align-items:baseline;gap:6px;margin-bottom:5px}
.neg-detail-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);flex-shrink:0}
.neg-detail-val{font-size:11px;font-weight:600;color:var(--text)}
.neg-valor{font-size:14px;font-weight:800;color:var(--navy)}
.neg-obs{font-size:10px;color:#3a4550;background:var(--bg);border-radius:6px;padding:7px 10px;line-height:1.5;margin-top:6px}
.neg-hint{font-size:9px;color:var(--muted);text-align:right;margin-top:4px}
.neg-empty{font-size:12px;color:var(--muted);text-align:center;padding:12px 0}
/* INTENCAO / OBJECOES */
.int-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.int-bar-lbl{width:110px;font-size:9px;font-weight:700;color:var(--text);flex-shrink:0;line-height:1.3}
.int-bar-wrap{flex:1;height:6px;border-radius:3px;overflow:hidden}
.int-bar-fill{height:100%;border-radius:3px}
.int-bar-pct{font-size:10px;font-weight:800;flex-shrink:0;width:30px;text-align:right}
.int-bar-cnt{font-size:9px;color:var(--muted);flex-shrink:0}
/* VISITAS */
.vis-item{padding:12px 0;border-bottom:1px solid var(--s2)}
.vis-item:first-child{padding-top:0}
.vis-item:last-child{border-bottom:none;padding-bottom:0}
.vis-item-top{display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
.vis-left{display:flex;align-items:center;gap:8px}
.vis-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.vis-nome{font-size:12px;font-weight:700}
.vis-data{font-size:10px;color:var(--muted);margin-top:1px}
.vis-badge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px}
.vis-badge.quer_comprar{background:var(--green-l);color:#065f46}
.vis-badge.esta_pensando{background:var(--yellow-l);color:#92400e}
.vis-badge.nao_gostou{background:var(--red-l);color:#991b1b}
.vis-badge.segunda_visita{background:var(--blue-l);color:#1e40af}
.vis-detail{margin-top:8px;display:none}
.vis-detail.open{display:block}
.vis-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.vis-tag{font-size:9px;padding:2px 7px;border-radius:8px;background:var(--red-bg);color:var(--red);font-weight:600}
.vis-obs{font-size:10px;color:#3a4550;background:var(--bg);border-radius:6px;padding:6px 8px;line-height:1.5}
.vis-hint{font-size:9px;color:var(--muted);text-align:right;margin-top:4px}
.vis-empty{font-size:12px;color:var(--muted);text-align:center;padding:8px 0}
/* GRID DESKTOP */
@media(min-width:900px){
  .page{flex:1;max-width:none;min-width:0;padding:20px 28px 40px 28px}
  .page-inner{max-width:1100px;margin:0 auto}
  .det-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  .det-full{grid-column:1/-1}
  .det-grid .scard{margin-bottom:0}
}
.loading{text-align:center;padding:60px 20px}
.loading-spin{width:28px;height:28px;border:3px solid var(--s2);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:var(--muted)}
.erro-box{background:var(--red-bg);border-radius:12px;padding:24px;margin:30px 0;text-align:center}
.erro-box p{font-size:13px;color:var(--red);font-weight:600}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .35s ease both}
.fd1{animation-delay:.04s}.fd2{animation-delay:.07s}.fd3{animation-delay:.10s}.fd4{animation-delay:.13s}.fd5{animation-delay:.16s}.fd6{animation-delay:.19s}.fd7{animation-delay:.22s}.fd8{animation-delay:.25s}.fd9{animation-delay:.28s}.fd10{animation-delay:.31s}.fd11{animation-delay:.34s}.fd12{animation-delay:.37s}.fd13{animation-delay:.40s}.fd14{animation-delay:.43s}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>

</div>

// --- UTILS ---
function fmtD(s){if(!s)return'-';var d=new Date(s+'T00:00:00');return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function fmtV(v){if(!v&&v!==0)return'-';return 'R$ '+parseFloat(v).toLocaleString('pt-BR');}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function avatarCor(n){var c=['#10B981','#3B82F6','#8B5CF6','#F59E0B','#191949','#06B6D4'],h=0;for(var i=0;i<(n||'?').length;i++)h=(n||'?').charCodeAt(i)+((h<<5)-h);return c[Math.abs(h)%c.length];}

// --- CALCS ---
function calcProporcional(im){
  var h=new Date();h.setHours(0,0,0,0);
  var dI=im.data_inicio?new Date(im.data_inicio+'T00:00:00'):null;
  var dF=im.data_fim?new Date(im.data_fim+'T00:00:00'):null;
  if(!dI||!dF)return{diasPassados:0,diasTotal:im.prazo_contrato_dias||120,fator:0};
  var diasTotal=Math.max(Math.round((dF-dI)/86400000),1);
  var diasPassados=Math.max(0,Math.min(Math.round((h-dI)/86400000),diasTotal));
  return{diasPassados:diasPassados,diasTotal:diasTotal,fator:Math.min(diasPassados/diasTotal,1)};
}
function semCor(real,esp){
  if(!esp||esp<=0)return 'green';
  var p=(real/esp)*100;
  if(p>=100)return 'green';
  if(p>=70)return 'yellow';
  return 'red';
}

// --- BLOCO: PRAZO ---
function prazoHtml(im){
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var dataInicio=im.data_inicio?new Date(im.data_inicio+'T00:00:00'):null;
  var dataFim=im.data_fim?new Date(im.data_fim+'T00:00:00'):null;
  var diasContrato=im.prazo_contrato_dias||120;
  var diasRep=im.prazo_repaginacao_dias?parseInt(im.prazo_repaginacao_dias):0;
  var diasVenda=diasContrato-diasRep;
  var diasRest=dataFim?Math.round((dataFim-hoje)/86400000):null;
  var restColor=diasRest===null?'var(--muted)':diasRest>60?'#10B981':diasRest>30?'#F59E0B':'#EF4444';
  var progPct=0;
  if(dataInicio&&dataFim){var total=Math.max(Math.round((dataFim-dataInicio)/86400000),1);var passados=Math.max(0,Math.min(Math.round((hoje-dataInicio)/86400000),total));progPct=Math.round((passados/total)*100);}
  var boxesHtml='';
  if(diasRep>0){boxesHtml+='<div class="prazo-box"><div class="prazo-box-lbl">Repaginacao</div><div class="prazo-box-num">'+diasRep+'<span class="prazo-box-unit">dias</span></div></div>';}
  boxesHtml+='<div class="prazo-box"><div class="prazo-box-lbl">Venda</div><div class="prazo-box-num">'+diasVenda+'<span class="prazo-box-unit">dias</span></div></div>';
  boxesHtml+='<div class="prazo-box"><div class="prazo-box-lbl">Total</div><div class="prazo-box-num">'+diasContrato+'<span class="prazo-box-unit">dias</span></div></div>';
  var restLabel=diasRest===null?'-':diasRest>=0?diasRest+' dias restantes':Math.abs(diasRest)+' dias alem do prazo';
  return '<div class="prazo-boxes">'+boxesHtml+'</div><div class="prazo-prog-row"><span class="prazo-prog-lbl">Progresso</span><span class="prazo-rest" style="color:'+restColor+'">'+restLabel+'</span></div><div class="prazo-bar-wrap"><div class="prazo-bar-fill" style="width:'+progPct+'%;background:'+restColor+'"></div></div><div class="prazo-dates"><span class="prazo-date-lbl">'+fmtD(im.data_inicio)+'</span><span class="prazo-date-lbl">'+fmtD(im.data_fim)+'</span></div>';
}

// --- BLOCO: FUNIL (metas vs realizado) ---
function funilBarRow(lbl,real,meta,esp){
  var cor=semCor(real,esp);
  var pctReal=meta>0?Math.min((real/meta)*100,100):0;
  var pctEsp=meta>0?Math.min((esp/meta)*100,100):0;
  var behind=real<esp?' behind':'';
  return '<div class="fun-bar-row">'
    +'<div class="fun-bar-lbl">'+lbl+'</div>'
    +'<div class="fun-bar-wrap">'
      +'<div class="fun-bar-bg s-'+cor+'" style="width:'+pctEsp+'%"></div>'
      +'<div class="fun-bar-fill s-'+cor+'" style="width:'+pctReal+'%"></div>'
      +'<div class="fun-bar-marker" style="left:'+pctEsp+'%"></div>'
    +'</div>'
    +'<div class="fun-bar-nums">'
      +'<span class="fun-num-real'+behind+'">'+real+'</span>'
      +'<span class="fun-num-exp">/ '+esp+'</span>'
      +'<span class="fun-num-tot">de '+meta+'</span>'
    +'</div>'
  +'</div>';
}
function funilConvBox(lbl,real,meta){
  var cor='var(--muted)';
  if(meta>0){var pct=(real/meta)*100;cor=pct>=100?'var(--green)':(pct>=70?'var(--yellow)':'var(--red)');}
  var realStr=(real!==null&&!isNaN(real))?real.toFixed(1).replace('.',',')+'%':'-';
  var metaStr=meta>0?'meta '+meta.toFixed(1).replace('.',',')+'%':'sem meta';
  return '<div class="fun-conv-box"><div class="fun-conv-lbl">'+lbl+'</div><div class="fun-conv-val" style="color:'+cor+'">'+realStr+'</div><div class="fun-conv-meta">'+metaStr+'</div></div>';
}
function funilHtml(im){
  var prop=calcProporcional(im);
  var f=prop.fator;
  var mL=im.meta_leads||0,mV=im.meta_visitas||0,mP=im.meta_propostas||0;
  var rL=im.total_leads||0,rV=im.total_visitas||0,rP=im.total_propostas||0;
  var espL=Math.round(mL*f),espV=Math.round(mV*f),espP=Math.round(mP*f);
  var html='';
  html+=funilBarRow('Leads',rL,mL||1,espL);
  html+=funilBarRow('Visitas',rV,mV||1,espV);

  var convLV=rL>0?(rV/rL)*100:null;
  var convVP=rV>0?(rP/rV)*100:null;
  var metaLV=parseFloat(im.meta_conv_lead_visita)||0;
  var metaVP=parseFloat(im.meta_conv_visita_prop)||0;
  html+='<div class="fun-conv-wrap">'
    +funilConvBox('Lead -> Visita',convLV,metaLV)
    +funilConvBox('Visita -> Proposta',convVP,metaVP)
  +'</div>';
  return html;
}

// --- BLOCO: INVESTIMENTO (extended) ---
function midiaHtml(im){
  var prop=calcProporcional(im);
  var f=prop.fator;
  var gasto=parseFloat(im.gastos_metaads)||0;
  var metaInv=parseFloat(im.meta_investimento)||0;
  var alcance=im.alcance_metaads?parseInt(im.alcance_metaads):0;
  var freq=im.frequencia_metaads?parseFloat(im.frequencia_metaads):0;
  var rL=im.total_leads||0;
  var cplReal=rL>0?gasto/rL:0;
  var cplMeta=parseFloat(im.meta_cpl)||0;
  // Investido: comparar contra esperado proporcional
  var espInv=metaInv>0?metaInv*f:0;
  var invOver=espInv>0&&gasto>espInv;
  var invUnder=espInv>0&&gasto<=espInv;
  var invCls=invOver?'over':(invUnder?'under':'');
  var invMetaTxt=metaInv>0?('meta '+(gasto>espInv?'acima':'dentro')+' - R$ '+metaInv.toLocaleString('pt-BR')):'sem meta';
  var invMetaCls=invOver?'over':(invUnder?'under':'');
  // CPL: verde se abaixo da meta, vermelho se acima
  var cplOver=cplMeta>0&&cplReal>cplMeta;
  var cplUnder=cplMeta>0&&cplReal>0&&cplReal<=cplMeta;
  var cplCls=cplOver?'over':(cplUnder?'under':'');
  var cplMetaTxt=cplMeta>0?('meta R$ '+cplMeta.toLocaleString('pt-BR')):'sem meta';
  var cplMetaCls=cplOver?'over':(cplUnder?'under':'');
  return '<div class="midia-grid">'
    +'<div class="midia-box"><div class="midia-box-lbl">Investido</div><div class="midia-box-val '+invCls+'">'+(gasto>0?'R$ '+gasto.toLocaleString('pt-BR'):'-')+'</div><div class="midia-box-meta '+invMetaCls+'">'+invMetaTxt+'</div></div>'
    +'<div class="midia-box"><div class="midia-box-lbl">CPL</div><div class="midia-box-val '+cplCls+'">'+(cplReal>0?'R$ '+Math.round(cplReal).toLocaleString('pt-BR'):'-')+'</div><div class="midia-box-meta '+cplMetaCls+'">'+cplMetaTxt+'</div></div>'
    +'<div class="midia-box"><div class="midia-box-lbl">Alcance</div><div class="midia-box-val">'+(alcance>0?alcance.toLocaleString('pt-BR'):'-')+'</div><div class="midia-box-meta">total impactados</div></div>'
    +'<div class="midia-box"><div class="midia-box-lbl">Frequencia</div><div class="midia-box-val">'+(freq>0?freq.toFixed(2).replace('.',','):'-')+'</div><div class="midia-box-meta">impressoes por pessoa</div></div>'
  +'</div>';
}

  if(el)el.innerHTML=negListaHtml(_negs,f);
}
function toggleNeg(id){var el=document.getElementById(id);if(el)el.classList.toggle('open');}
function toggleVis(id){var el=document.getElementById(id);if(el)el.classList.toggle('open');}
window.setFiltro=setFiltro;window.toggleNeg=toggleNeg;window.toggleVis=toggleVis;

// --- RENDER ---
function renderPage(im,vis,negs){
  _negs=negs;_currentIm=im;
  var nome=im.nome||'Im\u00f3vel';
  var atualizado=im.atualizado_em?new Date(im.atualizado_em).toLocaleString('pt-BR'):null;
  var obsHtml=objecoesHtml(vis);
  var html='<div class="page-inner">';
  // 1. HERO + botao Editar
  html+='<div class="hero-card fade-in">'
    +'<div class="hero-top">'
      +'<div class="hero-nome">'+escHtml(nome).toUpperCase()+'</div>'
      +'<button class="btn-editar-hero" onclick="window.location.href=\'exclusividades.html#editar/'+im.id+'\'">Editar</button>'
    +'</div>'
    +'<div class="hero-row2"><span class="hero-prop">'+escHtml(im.proprietario||'')+'</span><span class="hero-preco">'+escHtml(im.preco||'')+'</span></div>'
  +'</div>';
  // 2. Updated at
  if(atualizado)html+='<div class="updated-at fade-in fd1">\u00daltima atualiza\u00e7\u00e3o: '+atualizado+'</div>';
  // grid
  html+='<div class="det-grid">';
  // 3. Prazo
  html+='<div class="scard fade-in fd2"><div class="scard-title">Prazo da Exclusividade</div>'+prazoHtml(im)+'</div>';
  // 4. Funil
  html+='<div class="scard fade-in fd3"><div class="scard-title">Funil - Metas vs Realizado</div>'+funilHtml(im)+'</div>';
  // 5. Investimento
  html+='<div class="scard fade-in fd4"><div class="scard-title">Investimento em M\u00eddia</div>'+midiaHtml(im)+'</div>';
  // 6. Canais de leads
  html+='<div class="scard fade-in fd5"><div class="scard-title">Canais de Aquisi\u00e7\u00e3o de Leads</div>'+canaisLeadsHtml(im)+'</div>';
  // 7. Visitas por origem
  html+='<div class="scard fade-in fd6"><div class="scard-title">Visitas por Origem</div>'+canaisVisitasHtml(vis)+'</div>';
  // 8. Propostas por fonte
  html+='<div class="scard fade-in fd7"><div class="scard-title">Propostas por Fonte</div>'+propostasFonteHtml(im)+'</div>';
  // 9. Disparos
  html+='<div class="scard fade-in fd8"><div class="scard-title">Disparos</div>'+disparosHtml(im)+'</div>';
  // 10. Propostas (full)
  html+='<div class="scard det-full fade-in fd9"><div class="scard-title">Propostas ('+negs.length+')</div>'+negHtml(negs)+'</div>';
  // 11. Intencao
  html+='<div class="scard fade-in fd10"><div class="scard-title">Inten\u00e7\u00e3o P\u00f3s-Visita</div>'+intencaoHtml(vis)+'</div>';
  // 12. Objecoes (condicional)
  if(obsHtml)html+='<div class="scard fade-in fd11"><div class="scard-title">Principais Obje\u00e7\u00f5es</div>'+obsHtml+'</div>';
  // 13. Relatorio visitas (full)
  html+='<div class="scard det-full fade-in fd12"><div class="scard-title">Relat\u00f3rio de Visitas ('+vis.length+')</div>'+visitasHtml(vis)+'</div>';
  // 14. Timeline (full)
  html+='<div class="scard det-full fade-in fd13"><div class="scard-title">Timeline Operacional</div>'+timelineHtml(im)+'</div>';
  html+='</div></div>';
  document.getElementById('main').innerHTML=html;
  document.title=nome+' | Detalhe | Certeiro One';
}

// --- LOAD ---
async function load(){
  var params=new URLSearchParams(window.location.search);
  var id=params.get('id');
  if(!id){window.location.href='pipeline.html';return;}
  try{
    var res=await sb.from('dashboard_imoveis').select('*').eq('id',id).single();
    if(res.error)throw res.error;
    var im=res.data;
    if(!im){document.getElementById('main').innerHTML='<div class="erro-box"><p>Im\u00f3vel n\u00e3o encontrado.</p></div>';return;}
    var vis=[];
    if(im.imovel_id){var vr=await sb.from('visitas').select('*').eq('imovel_id',im.imovel_id).order('data_visita',{ascending:false});vis=vr.data||[];}
    var negs=[];
    if(im.imovel_id){var nr=await sb.from('propostas').select('*').eq('imovel_id',im.imovel_id).order('data',{ascending:false});negs=nr.data||[];}
    renderPage(im,vis,negs);
  }catch(err){
    document.getElementById('main').innerHTML='<div class="erro-box"><p>Erro ao carregar: '+escHtml(err.message)+'</p></div>';
  }
}

// --- AUTH ---
async function loginUser(){
  var email=document.getElementById('authEmail').value.trim();
  var senha=document.getElementById('authSenha').value;
  var btn=document.getElementById('authBtn');
  var err=document.getElementById('authErr');
  err.textContent='';
  if(!email||!senha){err.textContent='Preencha email e senha.';return;}
  btn.disabled=true;btn.textContent='Entrando...';
  try{
    var res=await sb.auth.signInWithPassword({email:email,password:senha});
    if(res.error)throw res.error;
  }catch(e){
    err.textContent=e.message||'Erro ao entrar.';
    btn.disabled=false;btn.textContent='Entrar';
  }
}
async function recuperarSenha(){
  var email=document.getElementById('authEmail').value.trim();
  if(!email){document.getElementById('authErr').textContent='Digite seu email acima primeiro.';return;}
  var res=await sb.auth.resetPasswordForEmail(email);
  if(res.error){document.getElementById('authErr').textContent=res.error.message;}
  else{
    document.getElementById('authErr').style.color='#10B981';
    document.getElementById('authErr').textContent='Email de recupera\u00e7\u00e3o enviado!';
  }
}
async function logoutUser(){
  await sb.auth.signOut();
  currentUser=null;currentRole='padrao';currentNome='';currentUsuarioId=null;
  document.getElementById('authOverlay').style.display='flex';
  document.getElementById('authBtn').disabled=false;
  document.getElementById('authBtn').textContent='Entrar';
  document.getElementById('authEmail').value='';
  document.getElementById('authSenha').value='';
  document.getElementById('authErr').textContent='';
}
window.logoutUser=logoutUser;
window.loginUser=loginUser;
window.recuperarSenha=recuperarSenha;

function applyRoleUI(){
  // detalhe.html e read-only; botao Editar do hero aparece para todos os roles
  // ja que a edicao ocorre em exclusividades.html, que tem seu proprio controle de role.
}

async function onLogin(user){
  currentUser=user;
  var pr=await sb.from('usuarios').select('*').eq('auth_id',user.id).single();
  if(pr.data){currentRole=pr.data.role||'padrao';currentNome=pr.data.nome||user.email;currentUsuarioId=pr.data.id;}
  else{currentRole='padrao';currentNome=user.email;}
  if(typeof CertNav!=='undefined'){
    CertNav.init('pipeline');
    CertNav.setUser(currentNome,currentRole);
  }
  document.getElementById('authOverlay').style.display='none';
  applyRoleUI();
  load();
}

// --- INIT ---
sb.auth.onAuthStateChange(function(event,session){
  if((event==='SIGNED_IN'||event==='INITIAL_SESSION')&&session&&session.user){
    onLogin(session.user);
  }else if(event==='SIGNED_OUT'){
    document.getElementById('authOverlay').style.display='flex';
  }
});
(function(){
  sb.auth.getSession().then(function(r){
    if(!r.data.session){document.getElementById('authOverlay').style.display='flex';}
  });
})();
</script>
