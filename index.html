<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gabriel Certeiro &mdash; Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#191949;--white:#FFFFFF;--bg:#F5F5F8;--text:#191949;--muted:#8E8EA0;--s2:#ECECF1;--s3:#D9D9E3;--green:#10B981;--green-bg:rgba(16,185,129,0.08);--green-l:#D1FAE5;--red:#EF4444;--red-bg:rgba(239,68,68,0.08);--red-l:#FEE2E2;--yellow:#F59E0B;--yellow-bg:rgba(245,158,11,0.08);--yellow-l:#FEF3C7;--blue:#3B82F6;--blue-bg:rgba(59,130,246,0.08);--blue-l:#DBEAFE;--navy-l:rgba(25,25,73,0.08);--card-shadow:0 1px 3px rgba(25,25,73,0.06),0 1px 2px rgba(25,25,73,0.04);--card-radius:14px}
html,body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}

/* HEADER */
.hdr{background:var(--navy);display:flex;justify-content:space-between;align-items:center;padding:14px 20px 12px;position:sticky;top:0;z-index:200}
.hdr-logo .brand{color:#fff;font-size:14px;font-weight:900;letter-spacing:2.2px;text-transform:uppercase}
.hdr-logo .sub{color:rgba(255,255,255,0.35);font-size:8.5px;letter-spacing:1.6px;text-transform:uppercase;margin-top:2px}
.hdr-date{text-align:right}
.hdr-date .d1{color:rgba(255,255,255,0.4);font-size:10px}
.hdr-date .d2{color:rgba(255,255,255,0.8);font-size:11px;font-weight:700;margin-top:1px}

/* MOBILE LAYOUT */
.app-wrap{display:block}
.page{padding:14px 16px 90px;max-width:480px;margin:0 auto}

/* NAV MOBILE */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--s2);display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,8px);z-index:999;box-shadow:0 -2px 8px rgba(25,25,73,0.04)}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 4px;cursor:pointer;position:relative;transition:opacity .15s;min-width:42px}
.nav-btn .nav-icon,.nav-btn .nav-label{opacity:0.35;transition:opacity .15s}
.nav-btn.active .nav-icon,.nav-btn.active .nav-label{opacity:1}
.nav-icon{font-size:16px;line-height:1;display:block}
.nav-label{font-size:8px;font-weight:700;color:var(--navy);display:block}
.nav-badge{position:absolute;top:-2px;right:0;background:var(--red);color:#fff;font-size:8px;font-weight:800;width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center}
/* Registro destaque mobile */
.nav-btn[data-tab="registro"]{background:var(--navy);border-radius:12px;padding:5px 8px}
.nav-btn[data-tab="registro"] .nav-label,.nav-btn[data-tab="registro"] .nav-icon{opacity:1;color:#fff}

/* DESKTOP */
@media(min-width:900px){
  .hdr{padding:16px 40px}
  .hdr-logo .brand{font-size:16px}
  .app-wrap{display:flex;align-items:flex-start;max-width:1440px;margin:0 auto;padding:0 32px}

  /* Sidebar */
  .bottom-nav{
    position:sticky;top:72px;
    width:210px;min-width:210px;flex-shrink:0;
    background:var(--white);border:1px solid var(--s2);border-radius:var(--card-radius);
    box-shadow:var(--card-shadow);
    flex-direction:column;justify-content:flex-start;align-items:stretch;
    padding:8px 6px;height:fit-content;margin-top:20px;
    left:auto;right:auto;bottom:auto;z-index:10;
  }

  /* Itens sidebar */
  .nav-btn{
    flex-direction:row;justify-content:flex-start;
    gap:10px;padding:10px 12px;border-radius:8px;
    min-width:auto;width:100%;
    border-left:3px solid transparent;
    transition:background .15s,border-color .15s;
  }
  /* Inativo */
  .nav-btn .nav-icon,.nav-btn .nav-label{opacity:0.45}
  /* Hover */
  .nav-btn:hover{background:rgba(25,25,73,0.04)}
  .nav-btn:hover .nav-icon,.nav-btn:hover .nav-label{opacity:0.8}
  /* Ativo — borda navy esquerda + fundo suave */
  .nav-btn.active{
    background:rgba(25,25,73,0.06);
    border-left-color:var(--navy);
    border-radius:0 8px 8px 0;
  }
  .nav-btn.active .nav-icon,.nav-btn.active .nav-label{opacity:1}

  .nav-icon{font-size:17px}
  .nav-label{font-size:12px;font-weight:700;color:var(--text)}

  /* Registro no desktop sem destaque especial */
  .nav-btn[data-tab="registro"]{background:none;border-radius:0 8px 8px 0;padding:10px 12px}
  .nav-btn[data-tab="registro"] .nav-label,.nav-btn[data-tab="registro"] .nav-icon{opacity:0.45;color:var(--text)}
  .nav-btn[data-tab="registro"]:hover .nav-label,.nav-btn[data-tab="registro"]:hover .nav-icon{opacity:0.8;color:var(--text)}
  .nav-btn[data-tab="registro"].active{background:rgba(25,25,73,0.06);border-left-color:var(--navy)}
  .nav-btn[data-tab="registro"].active .nav-label,.nav-btn[data-tab="registro"].active .nav-icon{opacity:1;color:var(--text)}

  /* Ocultar Mais no desktop */
  .nav-btn[data-tab="mais"]{display:none}
  .mais-overlay,.mais-drawer{display:none!important}

  /* Content */
  .page{flex:1;max-width:none;min-width:0;padding:20px 0 40px 28px}

  /* Grid listas */
  #cardsWrap{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  #cardsWrap .icard{margin-bottom:0}

  /* Grid detalhe */
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
  .detail-grid .scard{margin-bottom:0}
  .detail-col-full{grid-column:1/-1}

  .desktop-extras{display:block}
}
@media(min-width:1280px){
  #cardsWrap{grid-template-columns:repeat(3,1fr)}
  .bottom-nav{width:230px;min-width:230px}
}

/* Extras sidebar desktop */
.desktop-extras{display:none;border-top:1px solid var(--s2);margin-top:6px;padding-top:6px}
.dx-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;border-left:3px solid transparent;transition:background .15s}
.dx-item .dx-icon,.dx-item .dx-lbl{opacity:0.35}
.dx-item:hover{background:rgba(25,25,73,0.04)}
.dx-item:hover .dx-icon,.dx-item:hover .dx-lbl{opacity:0.65}
.dx-icon{font-size:16
