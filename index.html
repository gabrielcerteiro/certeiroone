<style>

.auth-box{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:340px;text-align:center}
.auth-logo{font-size:13px;font-weight:900;letter-spacing:2.2px;text-transform:uppercase;color:var(--navy);margin-bottom:4px}
.auth-sub{font-size:9px;color:#8E8EA0;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:28px}
.auth-input{width:100%;border:1.5px solid #ECECF1;border-radius:12px;padding:14px 16px;font-size:14px;font-family:'Nunito Sans',sans-serif;color:var(--navy);outline:none;text-align:left;letter-spacing:0;margin-bottom:10px;-webkit-appearance:none;background:#fff}
.auth-input:focus{border-color:var(--navy)}
.auth-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;font-family:'Nunito Sans',sans-serif;cursor:pointer;margin-top:2px}
.auth-btn:disabled{opacity:0.6;cursor:not-allowed}
.auth-err{font-size:12px;color:#EF4444;font-weight:700;margin-top:10px;min-height:18px}
.auth-link{font-size:11px;color:#8E8EA0;cursor:pointer;margin-top:14px;display:block;font-weight:700}
.auth-link:hover{color:var(--navy)}
.auth-lbl{font-size:11px;font-weight:700;color:var(--navy);text-align:left;margin-bottom:4px;display:block}
:root{--navy:#191949;--white:#FFFFFF;--bg:#F5F5F8;--text:#191949;--muted:#8E8EA0;--s2:#ECECF1;--s3:#D9D9E3;--green:#10B981;--green-bg:rgba(16,185,129,0.08);--green-l:#D1FAE5;--red:#EF4444;--red-bg:rgba(239,68,68,0.08);--red-l:#FEE2E2;--yellow:#F59E0B;--yellow-bg:rgba(245,158,11,0.08);--yellow-l:#FEF3C7;--blue:#3B82F6;--blue-bg:rgba(59,130,246,0.08);--blue-l:#DBEAFE;--navy-l:rgba(25,25,73,0.08);--card-shadow:0 1px 3px rgba(25,25,73,0.06),0 1px 2px rgba(25,25,73,0.04);--card-radius:14px}
html,body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.hdr{background:var(--navy);display:flex;justify-content:space-between;align-items:center;padding:14px 20px 12px;position:sticky;top:0;z-index:200}
.app-wrap{display:block}
.page{padding:14px 16px calc(72px + env(safe-area-inset-bottom));max-width:480px;margin:0 auto}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--s2);display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,8px);height:calc(64px + env(safe-area-inset-bottom));z-index:999;box-shadow:0 -2px 8px rgba(25,25,73,0.04)}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 4px;cursor:pointer;position:relative;min-width:42px}
.nav-btn .nav-icon,.nav-btn .nav-label{opacity:0.3;color:var(--muted);transition:opacity .15s,color .15s}
.nav-btn.active{background:none;border-radius:0;padding:4px 4px;box-shadow:inset 0 2px 0 0 var(--navy);margin-top:0}
.nav-btn.active .nav-icon,.nav-btn.active .nav-label{opacity:1;color:var(--navy)}
.nav-btn.active .nav-label{font-weight:700}
.nav-icon{display:flex;align-items:center;justify-content:center;line-height:1}
.nav-icon svg{width:20px;height:20px;display:block}
.nav-label{font-size:9px;font-weight:700;color:var(--muted);display:block;text-transform:uppercase;letter-spacing:0.5px}
.nav-badge{position:absolute;top:-2px;right:0;background:var(--red);color:#fff;font-size:8px;font-weight:800;width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center}

  .nav-btn .nav-icon,.nav-btn .nav-label{opacity:0.45;color:var(--text)}

  .nav-btn.active{background:rgba(25,25,73,0.06);border-left-color:var(--navy);border-radius:0 8px 8px 0;padding:10px 12px}
  .nav-btn.active .nav-icon,.nav-btn.active .nav-label{opacity:1;color:var(--navy);font-weight:700}
  .nav-icon svg{width:18px;height:18px;display:block}
  .nav-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
  .nav-btn[data-tab="mais"]{display:none}
  .mais-overlay,.mais-drawer{display:none!important}
  .nav-sep{display:block;height:1px;background:var(--s2);margin:6px 8px}
  .nav-module.role-vis{display:flex;opacity:0.55}
  .nav-badge-soon{font-size:8px;font-weight:700;padding:2px 6px;border-radius:6px;background:var(--s2);color:var(--muted);margin-left:auto}
  .page{flex:1;max-width:none;min-width:0;padding:20px 0 40px 28px}
}
.card{background:var(--white);border-radius:var(--card-radius);padding:16px 18px;border:1px solid var(--s2);box-shadow:var(--card-shadow);margin-bottom:12px}
.card-navy{background:var(--navy);border-radius:var(--card-radius);padding:18px 20px;border:none;margin-bottom:14px}
.lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px}
.pill{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.pill-green{color:var(--green);background:var(--green-bg)}.pill-red{color:var(--red);background:var(--red-bg)}.pill-yellow{color:var(--yellow);background:var(--yellow-bg)}.pill-blue{color:var(--blue);background:var(--blue-bg)}
.stats-row{display:flex;gap:8px;margin-bottom:14px}
.stat-box{flex:1;text-align:center;background:var(--white);border-radius:12px;padding:12px 6px;border:1px solid var(--s2)}
.stat-n{font-size:22px;font-weight:900;line-height:1}.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px}
.loading{text-align:center;padding:50px 20px}.loading-spin{width:28px;height:28px;border:3px solid var(--s2);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}@keyframes spin{to{transform:rotate(360deg)}}.loading-txt{font-size:12px;color:var(--muted)}
.erro-box{background:var(--red-bg);border-radius:12px;padding:18px;margin:20px 0;text-align:center}.erro-box p{font-size:12px;color:var(--red)}.erro-box button{margin-top:10px;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;font-family:'Nunito Sans',sans-serif;cursor:pointer}
.save-toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-size:13px;font-weight:700;padding:12px 24px;border-radius:12px;z-index:400;opacity:0;transition:opacity .25s;pointer-events:none;font-family:'Nunito Sans',sans-serif;white-space:nowrap;box-shadow:0 4px 16px rgba(25,25,73,0.25)}.save-toast.show{opacity:1}
.view{display:none}.view.on{display:block}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>

<script>

function switchView(id){document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on');});var el=document.getElementById(id);if(el){el.classList.add('on');window.scrollTo({top:0});}}

function fmtD(s){if(!s)return'-';var d=new Date(s+'T00:00:00');return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function avatarCor(n){var c=['#10B981','#3B82F6','#8B5CF6','#F59E0B','#191949','#06B6D4'],h=0;for(var i=0;i<(n||'?').length;i++)h=(n||'?').charCodeAt(i)+((h<<5)-h);return c[Math.abs(h)%c.length];}
function inicial(n){return(n||'?').charAt(0).toUpperCase();}
function hoje(){var d=new Date(),m=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear();}
function fmtM(v){if(v>=1000000)return 'R$ '+(v/1000000).toFixed(1).replace('.',',')+'M';if(v>=1000)return 'R$ '+(v/1000).toFixed(0)+'K';return 'R$ '+v.toLocaleString('pt-BR');}
function parsePrecM(preco){var s=(preco||'').trim();if(s.toUpperCase().indexOf('M')>=0){return parseFloat(s.replace(/[^\d,]/g,'').replace(',','.'))||0;}var clean=s.replace(/[R$\s]/g,'');var raw;if(clean.indexOf(',')>=0){raw=parseFloat(clean.replace(/\./g,'').replace(',','.'))||0;}else{var dots=(clean.match(/\./g)||[]).length;if(dots>1){raw=parseFloat(clean.replace(/\./g,''))||0;}else if(dots===1){var pts=clean.split('.');raw=pts[1]&&pts[1].length===3?parseFloat(clean.replace(/\./g,''))||0:parseFloat(clean)||0;}else{raw=parseFloat(clean)||0;}}return raw>=1000?raw/1000000:raw;}
function diffDias(d1,d2){if(!d1||!d2)return null;return Math.round((new Date(d2+'T00:00:00')-new Date(d1+'T00:00:00'))/86400000);}
function calcMetaInterna(im){if(!im.data_midia_entregue||!im.prazo_interno_dias)return null;var d=new Date(im.data_midia_entregue+'T00:00:00');d.setDate(d.getDate()+parseInt(im.prazo_interno_dias));return d.toISOString().split('T')[0];}
function toggleSecao(listId,btn){var list=document.getElementById(listId);var arrow=btn?btn.querySelector('span:last-child'):null;if(list.style.display==='none'){list.style.display='block';if(arrow)arrow.textContent='&#8249;';}else{list.style.display='none';if(arrow)arrow.textContent='&#8250;';}}
function dismissAlerta(key){var dismissed=JSON.parse(localStorage.getItem('alertas_dismissed')||'[]');if(dismissed.indexOf(key)<0)dismissed.push(key);localStorage.setItem('alertas_dismissed',JSON.stringify(dismissed));renderAlertas();}
function renderAlertas(){var hj=new Date();hj.setHours(0,0,0,0);var dismissed=JSON.parse(localStorage.getItem('alertas_dismissed')||'[]');var groups=[];imoveis.forEach(function(im){var nome=(im.nome||'').toUpperCase();var alerts=[];function addAlert(nivel,msg,key){if(dismissed.indexOf(key)>=0)return;alerts.push({nivel:nivel,msg:msg,key:key});}var dataFimD=im.data_fim?new Date(im.data_fim+'T00:00:00'):null;var diasRest=dataFimD?Math.round((dataFimD-hj)/86400000):999;var metaInt=calcMetaInterna(im);if(diasRest<=30&&diasRest>0)addAlert('critico',diasRest+'d restantes de contrato','fim_'+im.id);if(diasRest<=0)addAlert('critico','contrato vencido ha '+Math.abs(diasRest)+'d','venc_'+im.id);if(metaInt&&Math.round((new Date(metaInt+'T00:00:00')-hj)/86400000)<=0)addAlert('critico','meta interna ultrapassada','metaint_'+im.id);if((im.total_visitas||0)===0&&im.data_midia_entregue)addAlert('atencao','campanha no ar sem visita','semvisita_'+im.id);if((im.total_propostas||0)===0&&(im.total_visitas||0)>=3)addAlert('atencao',(im.total_visitas)+'visitas sem proposta','semproposta_'+im.id);if(!im.data_gravacao_conteudo&&im.data_inicio){var diasSemGrav=diffDias(im.data_inicio,hj.toISOString().split('T')[0]);if(diasSemGrav>30)addAlert('atencao',diasSemGrav+'d sem gravacao de conteudo','semgrav_'+im.id);}if(alerts.length)groups.push({nome:nome,alerts:alerts,id:im.id});});var nc=0,na=0;groups.forEach(function(g){g.alerts.forEach(function(a){if(a.nivel==='critico')nc++;else na++;});});var html='<div class="stats-row"><div class="stat-box" style="'+(nc>0?'background:var(--red-bg);border-color:var(--red-l)':'')+'"><div class="stat-n" style="color:'+(nc>0?'var(--red)':'var(--green)')+'">'+nc+'</div><div class="stat-l">Critico</div></div><div class="stat-box" style="'+(na>0?'background:var(--yellow-bg);border-color:var(--yellow-l)':'')+'"><div class="stat-n" style="color:'+(na>0?'var(--yellow)':'var(--green)')+'">'+na+'</div><div class="stat-l">Atencao</div></div></div>';groups.forEach(function(g){var gnc=g.alerts.filter(function(a){return a.nivel==='critico';}).length;var gna=g.alerts.filter(function(a){return a.nivel==='atencao';}).length;var gid='alertGrp_'+g.id;html+='<div class="card" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding-bottom:10px" onclick="toggleSecao(\''+gid+'\',this)"><div><div style="font-size:13px;font-weight:800;color:var(--navy)">'+g.nome+'</div><div style="display:flex;gap:6px;margin-top:4px">'+(gnc?'<span class="pill pill-red">'+gnc+' critico</span>':'')+(gna?'<span class="pill pill-yellow">'+gna+' atencao</span>':'')+'</div></div><span style="color:var(--muted);font-size:18px">&#8250;</span></div><div id="'+gid+'" style="display:none;border-top:1px solid var(--s2);padding-top:10px">';g.alerts.forEach(function(a){var cor=a.nivel==='critico'?'var(--red)':'var(--yellow)';html+='<div id="alertrow_'+a.key+'" style="display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--s2)"><div style="display:flex;align-items:flex-start;gap:8px;flex:1"><div style="width:8px;height:8px;border-radius:50%;background:'+cor+';flex-shrink:0;margin-top:4px"></div><div style="font-size:12px;font-weight:600;color:var(--text);line-height:1.4">'+a.msg+'</div></div><button onclick="dismissAlerta(\''+a.key+'\')" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 0 0 10px;line-height:1;flex-shrink:0">&times;</button></div>';});html+='</div></div>';});if(!groups.length)html+='<div class="card" style="text-align:center;padding:40px"><div style="font-size:32px;margin-bottom:8px;color:var(--green)">&#10003;</div><div style="font-size:14px;font-weight:800;color:var(--green)">Tudo dentro da meta</div></div>';document.getElementById('vAlertas').innerHTML=html;}
async function loginUser(){var email=document.getElementById('authEmail').value.trim();var senha=document.getElementById('authSenha').value;var btn=document.getElementById('authBtn');var err=document.getElementById('authErr');err.textContent='';if(!email||!senha){err.textContent='Preencha email e senha.';return;}btn.disabled=true;btn.textContent='Entrando...';try{var res=await sb.auth.signInWithPassword({email:email,password:senha});if(res.error)throw res.error;}catch(e){err.textContent=e.message||'Erro ao entrar.';btn.disabled=false;btn.textContent='Entrar';}}
async function recuperarSenha(){var email=document.getElementById('authEmail').value.trim();if(!email){document.getElementById('authErr').textContent='Digite seu email acima primeiro.';return;}var res=await sb.auth.resetPasswordForEmail(email);if(res.error){document.getElementById('authErr').textContent=res.error.message;}else{document.getElementById('authErr').style.color='#10B981';document.getElementById('authErr').textContent='Email de recuperacao enviado!';}}

  try{
    var res=await sb.from('dashboard_imoveis').select('*').order('dias_restantes',{ascending:true});

function renderDashboard(){
  var ativas=imoveis.filter(function(x){return x.status_exclusividade==='ativa';});
  var gestao=imoveis.filter(function(x){return x.status_exclusividade==='gestao';});
  var repag=imoveis.filter(function(x){return x.status_exclusividade==='repaginando';});
  var aguard=imoveis.filter(function(x){return x.status_exclusividade==='aguardando';});
  var vendidas=imoveis.filter(function(x){return x.status_exclusividade==='vendida';});
  var vgv=ativas.concat(gestao).reduce(function(s,x){return s+(parsePrecM(x.preco)||0);},0);
  var alertasCnt=0;
  var hj=new Date();hj.setHours(0,0,0,0);
  imoveis.forEach(function(im){
    if(!im.data_fim)return;
    var fim=new Date(im.data_fim+'T00:00:00');
    var diff=Math.round((fim-hj)/86400000);
    if(diff>=0&&diff<=30)alertasCnt++;
  });
  var diasPT={'Repaginado':40,'Mobiliado':80,'Vazio':120};
  var tmmGestao=gestao.reduce(function(s,im){var pr=parsePrecM(im.preco)*1000000;var d=diasPT[im.tipo_imovel]||120;return s+(pr/(d/30)/5);},0);
  function fmtTMMK(v){if(v>=1000000)return 'R$'+(v/1000000).toFixed(1).replace('.',',')+'M';if(v>=1000)return 'R$'+(v/1000).toFixed(0)+'K';return 'R$'+Math.round(v);}
  var html='<div class="card-navy" style="margin-bottom:14px">'
    +'<div class="lbl">VGV em carteira</div>'
    +'<div style="font-size:32px;font-weight:900;color:#fff;line-height:1">'+fmtM(Math.round(vgv*1000000))+'</div>'
    +'<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px">'+ativas.length+' exclusividade'+(ativas.length===1?'':'s')+' ativa'+(ativas.length===1?'':'s')+'</div>'
    +'</div>';
  html+='<div class="stats-row" style="margin-bottom:14px">'
    +'<div class="stat-box"><div class="stat-n">'+ativas.length+'</div><div class="stat-l">Em Campanha</div></div>'
    +(gestao.length?'<div class="stat-box" style="border-color:#8B5CF6;background:#EDE9FE"><div class="stat-n" style="color:#5B21B6">'+gestao.length+'</div><div class="stat-l" style="color:#5B21B6">Gestao</div>'+(tmmGestao>0?'<div style="font-size:9px;color:#7C3AED;margin-top:2px">'+fmtTMMK(tmmGestao)+'/mes</div>':'')+'</div>':'')
    +'<div class="stat-box"><div class="stat-n">'+repag.length+'</div><div class="stat-l">Repaginando</div></div>'
    +'<div class="stat-box"><div class="stat-n">'+aguard.length+'</div><div class="stat-l">Aguardando</div></div>'
    +'<div class="stat-box"><div class="stat-n">'+vendidas.length+'</div><div class="stat-l">Vendidas</div></div>'
    +'</div>';
  if(alertasCnt>0){
    html+='<div class="card" style="border-left:3px solid var(--red);margin-bottom:12px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center">'
      +'<div><div style="font-size:13px;font-weight:800;color:var(--red)">'+alertasCnt+' alerta'+(alertasCnt===1?'':'s')+' de prazo</div>'
      +'<div style="font-size:11px;color:var(--muted);margin-top:2px">Exclusividades vencendo em 30 dias</div></div>'
      +'<button onclick="switchView(\'vAlertas\')" style="background:var(--red-bg);color:var(--red);border:none;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:800;font-family:\'Nunito Sans\',sans-serif;cursor:pointer">Ver</button>'
      +'</div>'
      +'</div>';
  }
  document.getElementById('dashContent').innerHTML=html;
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(function(){});}
</script>
