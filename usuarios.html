<script src="nav.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
.auth-overlay{position:fixed;inset:0;background:var(--navy);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:340px;text-align:center}
.auth-logo{font-size:13px;font-weight:900;letter-spacing:2.2px;text-transform:uppercase;color:var(--navy);margin-bottom:4px}
.auth-sub{font-size:9px;color:#8E8EA0;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:28px}
.auth-input{width:100%;border:1.5px solid #ECECF1;border-radius:12px;padding:14px 16px;font-size:14px;font-family:'Nunito Sans',sans-serif;color:var(--navy);outline:none;text-align:left;letter-spacing:0;margin-bottom:10px;-webkit-appearance:none;background:#fff}
.auth-input:focus{border-color:var(--navy)}
.auth-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:800;font-family:'Nunito Sans',sans-serif;cursor:pointer;margin-top:2px}
.auth-btn:disabled{opacity:0.6;cursor:not-allowed}
.auth-err{font-size:12px;color:#EF4444;font-weight:700;margin-top:10px;min-height:18px}
.auth-link{font-size:11px;color:#8E8EA0;cursor:pointer;margin-top:14px;display:block;font-weight:700}
.auth-link:hover{color:var(--navy)}
.auth-lbl{font-size:11px;font-weight:700;color:var(--navy);text-align:left;margin-bottom:4px;display:block}
:root{--navy:#191949;--white:#FFFFFF;--bg:#F5F5F8;--text:#191949;--muted:#8E8EA0;--s2:#ECECF1;--s3:#D9D9E3;--green:#10B981;--green-bg:rgba(16,185,129,0.08);--green-l:#D1FAE5;--red:#EF4444;--red-bg:rgba(239,68,68,0.08);--red-l:#FEE2E2;--yellow:#F59E0B;--yellow-bg:rgba(245,158,11,0.08);--yellow-l:#FEF3C7;--blue:#3B82F6;--blue-bg:rgba(59,130,246,0.08);--blue-l:#DBEAFE;--navy-l:rgba(25,25,73,0.08);--card-shadow:0 1px 3px rgba(25,25,73,0.06),0 1px 2px rgba(25,25,73,0.04);--card-radius:14px}
html,body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.hdr{background:var(--navy);display:flex;justify-content:space-between;align-items:center;padding:14px 20px 12px;position:sticky;top:0;z-index:200}
.hdr-logo .brand{color:#fff;font-size:14px;font-weight:900;letter-spacing:2.2px;text-transform:uppercase}
.hdr-logo .sub{color:rgba(255,255,255,0.35);font-size:8.5px;letter-spacing:1.6px;text-transform:uppercase;margin-top:2px}
.hdr-date{text-align:right}
.hdr-date .d1{color:rgba(255,255,255,0.4);font-size:10px}
.hdr-date .d2{color:rgba(255,255,255,0.8);font-size:11px;font-weight:700;margin-top:1px}
.app-wrap{display:block}
.page{padding:14px 16px calc(72px + env(safe-area-inset-bottom));max-width:480px;margin:0 auto}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--s2);display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,8px);height:calc(64px + env(safe-area-inset-bottom));z-index:999;box-shadow:0 -2px 8px rgba(25,25,73,0.04)}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 4px;cursor:pointer;position:relative;min-width:42px}
/* MOBILE: inativos apagados, ativo com linha navy no topo */
.nav-btn .nav-icon,.nav-btn .nav-label{opacity:0.3;color:var(--muted);transition:opacity .15s,color .15s}
.nav-btn.active{background:none;border-radius:0;padding:4px 4px;box-shadow:inset 0 2px 0 0 var(--navy);margin-top:0}
.nav-btn.active .nav-icon,.nav-btn.active .nav-label{opacity:1;color:var(--navy)}
.nav-btn.active .nav-label{font-weight:700}
.nav-icon{display:flex;align-items:center;justify-content:center;line-height:1}
.nav-icon svg{width:20px;height:20px;display:block}
.nav-label{font-size:9px;font-weight:700;color:var(--muted);display:block;text-transform:uppercase;letter-spacing:0.5px}
.nav-badge{position:absolute;top:-2px;right:0;background:var(--red);color:#fff;font-size:8px;font-weight:800;width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.nav-sep{display:none}
.nav-module{display:none}
.nav-badge-soon{display:none}
/* DESKTOP */
@media(min-width:900px){
  .hdr{padding:16px 40px}
  .hdr-logo .brand{font-size:16px}
  .app-wrap{display:flex;align-items:flex-start;max-width:1440px;margin:0 auto;padding:0 32px}
  .bottom-nav{position:sticky;top:72px;width:210px;min-width:210px;flex-shrink:0;background:var(--white);border:1px solid var(--s2);border-radius:var(--card-radius);box-shadow:var(--card-shadow);flex-direction:column;justify-content:flex-start;align-items:stretch;padding:8px 6px;height:fit-content;margin-top:20px;left:auto;right:auto;bottom:auto;z-index:10}
  .nav-btn{flex-direction:row;justify-content:flex-start;gap:10px;padding:10px 12px;border-radius:8px;min-width:auto;width:100%;border-left:3px solid transparent;transition:background .15s,border-color .15s}
  .nav-btn .nav-icon,.nav-btn .nav-label{opacity:0.45;color:var(--text)}
  .nav-btn:hover{background:rgba(25,25,73,0.04)}

  .nav-btn.active{background:rgba(25,25,73,0.06);border-left-color:var(--navy);border-radius:0 8px 8px 0;padding:10px 12px}
  .nav-btn.active .nav-icon,.nav-btn.active .nav-label{opacity:1;color:var(--navy);font-weight:700}
  .nav-icon svg{width:18px;height:18px;display:block}
  .nav-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
  .nav-btn[data-tab="registro"]{background:none;border-radius:0 8px 8px 0;padding:10px 12px}
  .nav-btn[data-tab="registro"] .nav-label,.nav-btn[data-tab="registro"] .nav-icon{opacity:0.45;color:var(--text)}
  .nav-btn[data-tab="registro"]:hover .nav-label,.nav-btn[data-tab="registro"]:hover .nav-icon{opacity:0.8;color:var(--text)}
  .nav-btn[data-tab="registro"].active{background:rgba(25,25,73,0.06);border-left-color:var(--navy)}
  .nav-btn[data-tab="registro"].active .nav-label,.nav-btn[data-tab="registro"].active .nav-icon{opacity:1;color:var(--text)}
  .nav-btn[data-tab="mais"]{display:none}
  .mais-overlay,.mais-drawer{display:none!important}
  .nav-sep{display:block;height:1px;background:var(--s2);margin:6px 8px}
  .nav-module.role-vis{display:flex;opacity:0.55}
  .nav-module[disabled]{cursor:default}
  .nav-badge-soon{font-size:8px;font-weight:700;padding:2px 6px;border-radius:6px;background:var(--s2);color:var(--muted);margin-left:auto}
  .page{flex:1;max-width:none;min-width:0;padding:20px 0 40px 28px}
  .cards-campanha{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .cards-std{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .cards-campanha .icard,.cards-std .icard{margin-bottom:0}
  .detail-grid{columns:2;column-gap:12px}
  .detail-grid .scard{break-inside:avoid;margin-bottom:10px;display:block}
  .detail-col-full{column-span:all;margin-bottom:10px}
  .mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
  .mod-grid .card,.mod-grid .card-navy,.mod-grid .scard{margin-bottom:0}
  .mod-col-full{grid-column:1/-1}
  .list-layout{display:grid;grid-template-columns:280px 1fr;gap:14px;align-items:start}
  .desktop-extras{display:block}
}
@media(min-width:1280px){
  .bottom-nav{width:230px;min-width:230px}
  .detail-grid{columns:3}
  .mod-grid{grid-template-columns:1fr 1fr 1fr}
  .list-layout{grid-template-columns:1fr 1fr 1fr}
  .list-right{grid-column:2/-1}
}
.desktop-extras{display:none;border-top:1px solid var(--s2);margin-top:6px;padding-top:6px}

.dx-icon{font-size:16px;display:flex;align-items:center}.dx-icon svg{width:16px;height:16px;display:block}
.dx-lbl{font-size:12px;font-weight:700;color:var(--text)}

.vis-item{padding:12px 0;border-bottom:1px solid var(--s2)}.vis-item:first-child{padding-top:0}.vis-item:last-child{border-bottom:none;padding-bottom:0}.vis-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}.vis-left{display:flex;align-items:center;gap:9px}.vis-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}.vis-name{font-size:12px;font-weight:700}.vis-date{font-size:10px;color:var(--muted);margin-top:1px}.vis-tags{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0}.vis-tag{font-size:9px;padding:2px 7px;border-radius:8px;background:var(--bg);color:var(--navy);font-weight:600}.vis-obs{font-size:10px;color:#3a4550;background:var(--bg);border-radius:6px;padding:6px 8px;line-height:1.5;margin-top:5px}.vis-empty{font-size:12px;color:var(--muted);padding:8px 0;text-align:center}

<body>
<div class="auth-overlay" id="authOverlay" style="display:none">
  <div class="auth-box">
    <div class="auth-logo">Certeiro One</div>
    <label class="auth-lbl">Email</label>
    <input type="email" class="auth-input" id="authEmail" placeholder="seu@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')document.getElementById('authSenha').focus()">
    <label class="auth-lbl">Senha</label>
    <input type="password" class="auth-input" id="authSenha" placeholder="senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')loginUser()">
    <button class="auth-btn" id="authBtn" onclick="loginUser()">Entrar</button>
    <div class="auth-err" id="authErr"></div>
    <span class="auth-link" onclick="recuperarSenha()">Esqueci minha senha</span>
  </div>
</div>

<div class="hdr">
  <div class="hdr-logo"><div class="brand">Certeiro One</div><div class="sub"></div></div>
  <div class="hdr-date"><div class="d1" id="hdrData">-</div><div class="d2" id="hdrDia">-</div></div>
</div>

<div class="app-wrap">
  <div class="page">
    <div class="view on" id="vUsuarios">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div class="lbl">Usu&#225;rios</div>
        <button onclick="abrirNovoUsuario()" style="background:var(--navy);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:800;font-family:'Nunito Sans',sans-serif;cursor:pointer">+ Convidar</button>
      </div>
      <div id="novoUsuarioPanel" style="display:none;background:var(--white);border-radius:var(--card-radius);padding:14px 16px;border:1px solid var(--s2);margin-bottom:12px">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px">Novo usuario</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <input id="nuNome" type="text" placeholder="Nome completo" style="border:1.5px solid var(--s2);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Nunito Sans',sans-serif;color:var(--navy);outline:none">
          <input id="nuEmail" type="email" placeholder="email@exemplo.com" style="border:1.5px solid var(--s2);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Nunito Sans',sans-serif;color:var(--navy);outline:none">
          <select id="nuRole" style="border:1.5px solid var(--s2);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Nunito Sans',sans-serif;color:var(--navy);outline:none;background:#fff">
            <option value="padrao">Padrao &#8212; registra visitas e propostas proprias</option>
            <option value="operacional">Operacional &#8212; edita tudo em exclusividades e registro</option>
            <option value="master">Master &#8212; acesso total + gerenciar usuarios</option>
          </select>
          <input id="nuSenha" type="password" placeholder="Senha inicial" style="border:1.5px solid var(--s2);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Nunito Sans',sans-serif;color:var(--navy);outline:none">
        </div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button onclick="criarUsuario()" style="flex:1;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:800;font-family:'Nunito Sans',sans-serif;cursor:pointer">Criar</button>
          <button onclick="document.getElementById('novoUsuarioPanel').style.display='none'" style="background:none;border:1.5px solid var(--s2);border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;font-family:'Nunito Sans',sans-serif;color:var(--muted);cursor:pointer">Cancelar</button>
        </div>
        <div id="nuErr" style="font-size:12px;color:#EF4444;font-weight:700;margin-top:8px;min-height:16px"></div>
      </div>
      <div id="listaUsuarios"><div class="loading"><div class="loading-spin"></div>
    </div>
    <div class="view" id="vLogUsuario">
      <div class="det-topbar">
        <button class="back-btn" onclick="switchView('vUsuarios')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Usu&#225;rios</button>
      </div>
      <div id="logUsuarioNomeEl" style="font-size:15px;font-weight:900;color:var(--navy);margin-bottom:4px"></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px">Historico de atividades</div>
      <div id="logFiltros" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none"></div>
      <div id="logLista"></div>
    </div>
  </div>
</div>
<script>
var SUPA_URL='https://vtykzralkxlbqqkleofl.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0eWt6cmFsa3hsYnFxa2xlb2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjMyNjAsImV4cCI6MjA4OTkzOTI2MH0.rYBifw2NXqVDGrKbDWKJgrFAIdoruxxsIPc9RXibgy0';
var sb=supabase.createClient(SUPA_URL,SUPA_KEY);
var currentUser=null,currentRole='padrao',currentNome='',currentUsuarioId=null;
var logUsuarioId=null;var logUsuarioNomeCache='';var logFiltroAtivo='todos';var logDados=[];
var logFiltroAtivo='todos';var logDados=[];
var logDados=[];
var LOG_LABELS={todos:'Todos',login:'Login',exclusividade_atualizada:'Exclusividades',visita_cadastrada:'Visitas',proposta_cadastrada:'Propostas',usuario_criado:'Usuarios criados',permissao_alterada:'Permissoes'};

function switchView(id){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on');});
  var el=document.getElementById(id);
  if(el)el.classList.add('on');
  window.scrollTo({top:0});
}

function initHeader(){var d=new Date();document.getElementById('hdrData').textContent=hoje();document.getElementById('hdrDia').textContent='Dia '+diaDoAno(d)+' / '+diasNoAno();}
function showToast(msg){var t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.className='save-toast';document.body.appendChild(t);}t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2800);}
function fmtD(s){if(!s)return'-';var d=new Date(s+'T00:00:00');return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
function avatarCor(n){var c=['#10B981','#3B82F6','#8B5CF6','#F59E0B','#191949','#06B6D4'],h=0;for(var i=0;i<(n||'?').length;i++)h=(n||'?').charCodeAt(i)+((h<<5)-h);return c[Math.abs(h)%c.length];}
function inicial(n){return(n||'?').charAt(0).toUpperCase();}
function hoje(){var d=new Date(),m=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear();}
function diaDoAno(d){d=d||new Date();return Math.floor((d-new Date(d.getFullYear(),0,0))/86400000);}
function diasNoAno(a){a=a||new Date().getFullYear();return((a%4===0&&a%100!==0)||a%400===0)?366:365;}
async function loginUser(){var email=document.getElementById('authEmail').value.trim();var senha=document.getElementById('authSenha').value;var btn=document.getElementById('authBtn');var err=document.getElementById('authErr');err.textContent='';if(!email||!senha){err.textContent='Preencha email e senha.';return;}btn.disabled=true;btn.textContent='Entrando...';try{var res=await sb.auth.signInWithPassword({email:email,password:senha});if(res.error)throw res.error;// onAuthStateChange will handle the rest
async function recuperarSenha(){var email=document.getElementById('authEmail').value.trim();if(!email){document.getElementById('authErr').textContent='Digite seu email acima primeiro.';return;}var res=await sb.auth.resetPasswordForEmail(email);if(res.error){document.getElementById('authErr').textContent=res.error.message;}else{document.getElementById('authErr').style.color='#10B981';document.getElementById('authErr').textContent='Email de recuperacao enviado!';}}
async function logoutUser(){await sb.auth.signOut();currentUser=null;currentRole='padrao';currentNome='';currentUsuarioId=null;document.getElementById('authOverlay').style.display='flex';document.getElementById('authBtn').disabled=false;document.getElementById('authBtn').textContent='Entrar';document.getElementById('authEmail').value='';document.getElementById('authSenha').value='';document.getElementById('authErr').textContent='';}
async function onLogin(user,doLog){currentUser=user;var pr=await sb.from('usuarios').select('*').eq('auth_id',user.id).single();if(pr.data){currentRole=pr.data.role||'padrao';currentNome=pr.data.nome||user.email;currentUsuarioId=pr.data.id;}else{currentRole='padrao';currentNome=user.email;}applyRoleUI();CertNav.init('usuarios');CertNav.setUser(currentNome,currentRole);document.getElementById('authOverlay').style.display='none';var hash=window.location.hash.slice(1);if(hash&&tabMap[hash]){history.replaceState(null,'',window.location.pathname);loadDashboard().then(function(){switchTab(hash);});}else{loadDashboard();}if(doLog)logActivity('login',null,null,null);}
function applyRoleUI(){var isAdmin=currentRole==='master';var isEditor=currentRole==='operacional';var isPadrao=currentRole==='padrao';var canEdit=isAdmin||isEditor;
function logActivity(action,entityType,entityNome,detalhes){if(!currentUser)return;sb.from('activity_log').insert({user_id:currentUser.id,user_nome:currentNome,action:action,entity_type:entityType||null,entity_nome:entityNome||null,detalhes:detalhes||null}).then(function(){});}
async function renderUsuarios(){
function abrirEditUsuario(uid){var p=document.getElementById('editPanel_'+uid);if(p)p.style.display=p.style.display==='none'?'block':'none';}
function fecharEditUsuario(uid){var p=document.getElementById('editPanel_'+uid);if(p)p.style.display='none';}
async function salvarEdicaoUsuario(uid){var nome=document.getElementById('eu_nome_'+uid).value.trim();var email=document.getElementById('eu_email_'+uid).value.trim();var role=document.getElementById('eu_role_'+uid).value;var isCorretor=document.getElementById('eu_corretor_'+uid).checked;var ativo=document.getElementById('eu_ativo_'+uid).checked;if(!nome){showToast('Nome obrigatorio.');return;}var r=await sb.from('usuarios').update({nome:nome,email:email||null,role:role,is_corretor:isCorretor,ativo:ativo}).eq('id',uid);if(r.error){showToast('Erro: '+r.error.message);}else{logActivity('usuario_editado','usuario',nome,{role:role,ativo:ativo});showToast('Usuario atualizado!');renderUsuarios();}}
async function excluirUsuario(uid,nome,authId){if(!confirm('Excluir o usuario "'+nome+'"? Esta acao nao pode ser desfeita.'))return;try{if(authId){var sess=(await sb.auth.getSession()).data.session;if(sess){var res=await fetch(SUPA_URL+'/functions/v1/excluir-usuario',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+sess.access_token},body:JSON.stringify({auth_id:authId})});var json=await res.json();if(!res.ok)console.warn('Auth delete falhou:',json.error);}}var rd=await sb.from('usuarios').delete().eq('id',uid);if(rd.error)throw rd.error;logActivity('usuario_excluido','usuario',nome,null);showToast('Usuario excluido.');renderUsuarios();}catch(e){showToast('Erro: '+e.message);}}
async function toggleAtivo(uid,current){var novoVal=!current;var r=await sb.from('usuarios').update({ativo:novoVal}).eq('id',uid);if(r.error){showToast('Erro: '+r.error.message);}else{showToast(novoVal?'Usuario ativado.':'Usuario desativado.');renderUsuarios();}}
async function enviarLinkSenha(email){var r=await sb.auth.resetPasswordForEmail(email);if(r.error){showToast('Erro: '+r.error.message);}else{showToast('Link de senha enviado para '+email+'.');}}
async function criarUsuario(){var nome=document.getElementById('nuNome').value.trim();var email=document.getElementById('nuEmail').value.trim();var role=document.getElementById('nuRole').value;var senha=document.getElementById('nuSenha').value;var err=document.getElementById('nuErr');err.textContent='';if(!nome||!email||!senha){err.textContent='Preencha todos os campos.';return;}try{var sess=(await sb.auth.getSession()).data.session;if(!sess)throw new Error('Sessao expirada.');var res=await fetch(SUPA_URL+'/functions/v1/criar-usuario',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+sess.access_token},body:JSON.stringify({nome:nome,email:email,role:role,senha:senha})});var json=await res.json();if(!res.ok)throw new Error(json.error||'Erro ao criar usuario.');document.getElementById('novoUsuarioPanel').style.display='none';document.getElementById('nuNome').value='';document.getElementById('nuEmail').value='';document.getElementById('nuSenha').value='';logActivity('usuario_criado','usuario',nome,{email:email,role:role});showToast('Usuario criado! Oriente o usuario a fazer login.');renderUsuarios();}catch(e){err.textContent=e.message||'Erro ao criar usuario.';}}
function abrirNovoUsuario(){document.getElementById('novoUsuarioPanel').style.display='block';document.getElementById('nuNome').focus();}
async function abrirLogUsuario(uid,nome){logUsuarioId=uid;logUsuarioNomeCache=nome;logFiltroAtivo='todos';switchTab('logUsuario');document.getElementById('logUsuarioNomeEl').textContent=nome;document.getElementById('logLista').innerHTML='<div class="loading"><div class="loading-spin"></div></div>';var r=await sb.from('activity_log').select('*').eq('user_id',uid).order('created_at',{ascending:false}).limit(200);logDados=r.data||[];renderLogFiltros();renderLogLista();}
function renderLogFiltros(){var tipos=['todos','login','exclusividade_atualizada','visita_cadastrada','proposta_cadastrada','usuario_criado','permissao_alterada'];var contagens={todos:logDados.length};logDados.forEach(function(l){contagens[l.action]=(contagens[l.action]||0)+1;});var html=tipos.filter(function(t){return t==='todos'||contagens[t];}).map(function(t){var ativo=logFiltroAtivo===t;var n=contagens[t]||0;return '<button onclick="filtrarLog(\''+t+'\')" style="flex-shrink:0;border:1.5px solid '+(ativo?'var(--navy)':'var(--s2)')+';background:'+(ativo?'var(--navy)':'var(--white)')+';color:'+(ativo?'#fff':'var(--muted)')+';border-radius:20px;padding:6px 12px;font-size:11px;font-weight:700;font-family:\'Nunito Sans\',sans-serif;cursor:pointer;white-space:nowrap">'+(LOG_LABELS[t]||t)+(t!=='todos'?' ('+n+')':'')+'</button>';}).join('');document.getElementById('logFiltros').innerHTML=html;}
function filtrarLog(tipo){logFiltroAtivo=tipo;renderLogFiltros();renderLogLista();}
function renderLogLista(){var filtrado=logFiltroAtivo==='todos'?logDados:logDados.filter(function(l){return l.action===logFiltroAtivo;});var icones={login:'&#128272;',exclusividade_atualizada:'&#128203;',visita_cadastrada:'&#128682;',proposta_cadastrada:'&#128172;',usuario_criado:'&#128100;',permissao_alterada:'&#128273;'};var labels={login:'Entrou na plataforma',exclusividade_atualizada:'Atualizou exclusividade',visita_cadastrada:'Registrou visita',proposta_cadastrada:'Registrou proposta',usuario_criado:'Criou usuario',permissao_alterada:'Alterou permissao'};if(!filtrado.length){document.getElementById('logLista').innerHTML='<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:13px">Nenhuma atividade encontrada.</div>';return;}var html=filtrado.map(function(l){var dt=new Date(l.created_at);var dStr=dt.toLocaleDateString('pt-BR');var hStr=dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});var icone=icones[l.action]||'&#128204;';var label=labels[l.action]||l.action;var detalhe=l.entity_nome?'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+l.entity_nome+'</div>':'';return '<div style="display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--s2)"><div style="font-size:20px;flex-shrink:0;margin-top:1px">'+icone+'</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--navy)">'+label+'</div>'+detalhe+'</div><div style="text-align:right;flex-shrink:0"><div style="font-size:11px;color:var(--muted)">'+dStr+'</div><div style="font-size:11px;color:var(--muted)">'+hStr+'</div></div></div>';}).join('');document.getElementById('logLista').innerHTML='<div class="card" style="padding:0 16px">'+html+'</div>';}

sb.auth.onAuthStateChange(function(event,session){if((event==='SIGNED_IN'||event==='INITIAL_SESSION')&&session&&session.user){onLogin(session.user,event==='SIGNED_IN');}else if(event==='SIGNED_OUT'){document.getElementById('authOverlay').style.display='flex';}});
// Verificar sessao existente
(function(){sb.auth.getSession().then(function(r){if(!r.data.session){document.getElementById('authOverlay').style.display='flex';}});})();
initHeader();
</script>
